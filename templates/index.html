<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralForge AI | Premium Creator Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #00ffa6;
    --secondary: #00c3ff;
    --bg-dark: #050a15;
    --card-bg: rgba(13, 20, 38, 0.7);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

body {
    background-color: var(--bg-dark);
    background-image: 
        radial-gradient(circle at 10% 20%, rgba(0, 255, 166, 0.05) 0%, transparent 20%),
        radial-gradient(circle at 90% 80%, rgba(0, 195, 255, 0.05) 0%, transparent 20%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
}

.container {
    width: 100%;
    max-width: 650px; /* Wider for a more professional feel */
    padding: 3.5rem;
    border-radius: 40px;
    background: var(--card-bg);
    backdrop-filter: blur(40px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5);
    transition: all 0.5s ease;
}

h1 {
    font-size: 3.5rem;
    font-weight: 800;
    margin-bottom: 15px;
    background: linear-gradient(to right, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -2px;
}

.tagline {
    color: #94a3b8;
    font-size: 1.1rem;
    margin-bottom: 40px;
    font-weight: 300;
    line-height: 1.6;
}

/* Input Styling */
.form-group {
    margin-bottom: 25px;
    text-align: left;
}

label {
    display: block;
    font-size: 0.8rem;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 10px;
    letter-spacing: 1.5px;
    font-weight: 600;
}

.input-wrapper {
    position: relative;
    width: 100%;
}

input {
    width: 100%;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 20px;
    border-radius: 18px;
    color: #fff;
    font-size: 1rem;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: var(--primary);
    background: rgba(255, 255, 255, 0.06);
    box-shadow: 0 0 20px rgba(0, 255, 166, 0.1);
}

.char-count {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: #475569;
    font-size: 0.8rem;
}

.dropdown-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 30px;
}

select {
    width: 100%;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 15px;
    border-radius: 14px;
    color: #fff;
    appearance: none;
    cursor: pointer;
    outline: none;
}

/* Button */
#generateBtn {
    width: 100%;
    padding: 22px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #020617;
    font-size: 1.1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 15px 30px rgba(0, 255, 166, 0.2);
    transition: 0.3s;
}

#generateBtn:hover {
    transform: translateY(-3px);
    box-shadow: 0 20px 40px rgba(0, 255, 166, 0.4);
}

#generateBtn:active { transform: translateY(0); }

/* Results Section */
#results {
    margin-top: 40px;
    text-align: left;
}

.card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding: 30px;
    border-radius: 24px;
    margin-bottom: 20px;
    animation: fadeIn 0.8s ease forwards;
}

.card-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.copy-badge {
    background: rgba(0, 255, 166, 0.1);
    color: var(--primary);
    padding: 6px 14px;
    border-radius: 10px;
    font-size: 0.7rem;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid rgba(0, 255, 166, 0.2);
}

.loading-text {
    margin-top: 20px;
    color: var(--primary);
    font-weight: 600;
    letter-spacing: 1px;
    display: none;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="container">
    <h1>ViralForge</h1>
    <p class="tagline">The ultimate AI engine for creators who demand virality. Turn simple ideas into scroll-stopping content briefs.</p>

    <div class="form-group">
        <label>Your Niche</label>
        <div class="input-wrapper">
            <input type="text" id="nicheInput" maxlength="50" placeholder="e.g. Real Estate, Crypto, High Fashion">
            <span class="char-count" id="counter">0/50</span>
        </div>
    </div>

    <div class="dropdown-grid">
        <div class="form-group" style="margin:0;">
            <label>Content Tone</label>
            <select id="toneSelect">
                <option value="Authority">⚡ Authoritative</option>
                <option value="Hype">🔥 Viral Hype</option>
                <option value="Storytelling">📖 Storytelling</option>
            </select>
        </div>
        <div class="form-group" style="margin:0;">
            <label>Target Platform</label>
            <select id="platformSelect">
                <option value="TikTok">TikTok</option>
                <option value="Instagram">Reels</option>
                <option value="YouTube">Shorts</option>
            </select>
        </div>
    </div>

    <button id="generateBtn">Forge Viral Concept</button>

    <div class="loading-text" id="loading">QUANTIZING ALGORITHMS...</div>

    <div id="results"></div>
</div>

<script>
const input = document.getElementById("nicheInput");
const counter = document.getElementById("counter");
const btn = document.getElementById("generateBtn");
const results = document.getElementById("results");
const loading = document.getElementById("loading");

input.addEventListener("input", () => {
    counter.innerText = input.value.length + "/50";
});

btn.onclick = async () => {
    const niche = input.value.trim();
    if (!niche) return;

    btn.disabled = true;
    btn.innerText = "FORGING...";
    loading.style.display = "block";
    results.innerHTML = "";

    try {
        const res = await fetch(`/generate?niche=${encodeURIComponent(niche)}&tone=${toneSelect.value}&platform=${platformSelect.value}`);
        const data = await res.json();
        
        loading.style.display = "none";
        btn.disabled = false;
        btn.innerText = "FORGE VIRAL CONCEPT";

        if (data.status === "success") {
            const hooks = Array.isArray(data.hooks) ? data.hooks : [data.hook];
            hooks.forEach(h => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <div class="card-header">
                        <span style="color:#64748b; font-size:0.8rem;">STRATEGY READY</span>
                        <div class="copy-badge" onclick="navigator.clipboard.writeText('${h}')">COPY HOOK</div>
                    </div>
                    <div style="font-size:1.3rem; font-weight:600; line-height:1.4;">"${h}"</div>
                    <div style="margin-top:20px; padding-top:20px; border-top:1px solid rgba(255,255,255,0.05); color:#94a3b8; font-size:0.9rem;">
                        <p><strong>Scene 1:</strong> Point of view shot, fast zoom. Text overlay: "THE TRUTH ABOUT ${niche.toUpperCase()}"</p>
                    </div>
                `;
                results.appendChild(card);
            });
        }
    } catch (e) {
        btn.disabled = false;
        btn.innerText = "FORGE VIRAL CONCEPT";
        loading.style.display = "none";
    }
};
</script>

</body>
</html>
