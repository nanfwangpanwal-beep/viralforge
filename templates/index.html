<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralForge OS - Final Boss</title>

<link href="https://fonts.googleapis.com/css2?family=Exo:wght@800&family=Inter:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<style>
:root{
--mint:#35F0BA;
--violet:#A75FFF;
--bg:#020305;
--glass:rgba(15,18,25,.85);
--border:rgba(255,255,255,.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg);
color:#fff;
font-family:Inter, sans-serif;
overflow-x:hidden;
}

/* INTRO */
.intro{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
flex-direction:column;
animation:fadeOut 4s forwards 3s;
}
.logo-build{
font-family:Exo;
font-size:2rem;
background:linear-gradient(90deg,var(--mint),var(--violet));
-webkit-background-clip:text;
color:transparent;
opacity:0;
animation:build 2s forwards;
}
.tag{
opacity:0;
margin-top:10px;
font-size:12px;
letter-spacing:2px;
animation:fadeIn 2s forwards 1.5s;
}
@keyframes build{to{opacity:1;letter-spacing:2px}}
@keyframes fadeIn{to{opacity:.7}}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}

/* CURSOR GLOW */
.cursor-glow{
position:fixed;
width:300px;
height:300px;
background:radial-gradient(circle, rgba(53,240,186,0.15), transparent 70%);
pointer-events:none;
z-index:999;
transform:translate(-50%,-50%);
}

/* HEADER */
header{
position:sticky;
top:0;
background:rgba(0,0,0,.7);
backdrop-filter:blur(20px);
padding:15px 20px;
display:flex;
justify-content:space-between;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

/* CARD */
.card{
background:var(--glass);
padding:25px;
border-radius:25px;
border:1px solid var(--border);
transition:.4s cubic-bezier(0.16,1,0.3,1);
transform-style:preserve-3d;
}

/* INPUT */
textarea{
width:100%;
padding:15px;
border-radius:15px;
background:#000;
border:1px solid var(--border);
color:#fff;
}
textarea:focus{
box-shadow:0 0 20px rgba(53,240,186,0.25);
}

/* BUTTON */
button{
margin-top:15px;
width:100%;
padding:18px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,var(--mint),var(--violet));
font-weight:800;
cursor:pointer;
position:relative;
overflow:hidden;
}

.ripple{
position:absolute;
border-radius:50%;
transform:scale(0);
animation:ripple 600ms linear;
background:rgba(255,255,255,0.4);
}
@keyframes ripple{
to{transform:scale(4);opacity:0;}
}

/* OUTPUT */
.output{
margin-top:20px;
padding:20px;
border-left:3px solid var(--mint);
background:#05070a;
border-radius:20px;
}

/* METRICS */
.metric{margin-top:10px}
.bar{
height:6px;
background:#111;
border-radius:10px;
overflow:hidden;
}
.fill{
height:100%;
background:linear-gradient(90deg,var(--mint),var(--violet));
}

/* FADE */
.fade-in{
opacity:0;
transform:translateY(10px);
animation:fadeUp 0.6s forwards;
}
@keyframes fadeUp{
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<div class="cursor-glow"></div>

<div class="intro">
<div class="logo-build">ViralForge</div>
<div class="tag">WEAPONIZING WORDS INTO VIRALITY</div>
</div>

<header>
<div>ViralForge</div>
<div id="clock"></div>
</header>

<div style="font-size:10px;color:var(--mint);padding:5px 20px;">
SYSTEM STATUS: NEURAL ENGINE ACTIVE
</div>

<div class="container">
<div class="card">

<h3>Elite Ghostwriter</h3>

<textarea id="input" placeholder="Paste dialogue..."></textarea>

<button onclick="generate()">Forge Response</button>
<button onclick="remix()">Remix Output</button>

<div id="thinking" style="display:none;margin-top:15px;font-size:12px;color:var(--mint)">
<span id="stage">Initializing...</span>
</div>

<div id="output" class="output" style="display:none"></div>

</div>
</div>

<script>

/* CURSOR GLOW */
const glow=document.querySelector('.cursor-glow');
document.addEventListener('mousemove',e=>{
glow.style.left=e.clientX+'px';
glow.style.top=e.clientY+'px';
});

/* CARD 3D */
document.querySelectorAll('.card').forEach(card=>{
card.addEventListener('mousemove',e=>{
const rect=card.getBoundingClientRect();
const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

const rotateX=(y/rect.height-0.5)*8;
const rotateY=(x/rect.width-0.5)*-8;

card.style.transform=`rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
card.style.background=`radial-gradient(circle at ${x}px ${y}px, rgba(53,240,186,0.12), transparent 60%)`;
});
card.addEventListener('mouseleave',()=>{
card.style.transform='';
card.style.background='';
});
});

/* SOUND */
const clickSound=new Audio('https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3');
const successSound=new Audio('https://assets.mixkit.co/sfx/preview/mixkit-unlock-game-notification-253.mp3');

/* THINKING */
const stages=[
"Parsing intent...",
"Detecting emotional leverage...",
"Rewriting power frame...",
"Amplifying virality..."
];

function runThinking(){
let i=0;
const el=document.getElementById('stage');
const interval=setInterval(()=>{
el.innerText=stages[i];
i++;
if(i>=stages.length)clearInterval(interval);
},500);
}

/* TYPE EFFECT */
function typeEffect(el,text){
el.innerHTML="";
let i=0;
function typing(){
if(i<text.length){
el.innerHTML+=text.charAt(i);
i++;
requestAnimationFrame(typing);
}
}
typing();
}

/* GENERATE */
function generate(){
clickSound.play();

const thinking=document.getElementById('thinking');
const output=document.getElementById('output');

thinking.style.display='block';
output.style.display='none';

runThinking();

setTimeout(()=>{
thinking.style.display='none';
output.style.display='block';
output.classList.add('fade-in');

typeEffect(output,"You're overthinking this. The power isn't in chasing — it's in controlling the frame.");

setTimeout(()=>{
output.innerHTML+=metrics();
successSound.play();
},1200);

},2000);
}

/* METRICS */
function metrics(){
return `
<div class="metric">Viral Score<div class="bar"><div class="fill" style="width:92%"></div></div></div>
<div class="metric">Hook Strength<div class="bar"><div class="fill" style="width:88%"></div></div></div>
<div class="metric">Psychological Grip<div class="bar"><div class="fill" style="width:95%"></div></div></div>
`;
}

/* REMIX */
function remix(){
const modes=[
"Savage: You're replaceable. Act accordingly.",
"Luxury: Scarcity creates value. Move like it.",
"Dark: Control the frame or get controlled."
];

const output=document.getElementById('output');
output.innerHTML="";
typeEffect(output,modes[Math.floor(Math.random()*modes.length)]);
}

/* RIPPLE */
document.querySelectorAll('button').forEach(btn=>{
btn.addEventListener('click',function(e){
const circle=document.createElement("span");
circle.classList.add("ripple");

const rect=this.getBoundingClientRect();
circle.style.left=e.clientX-rect.left+"px";
circle.style.top=e.clientY-rect.top+"px";

this.appendChild(circle);
setTimeout(()=>circle.remove(),600);
});
});

/* CLOCK */
setInterval(()=>{
document.getElementById('clock').innerText=new Date().toLocaleTimeString();
},1000);

</script>

</body>
</html>
