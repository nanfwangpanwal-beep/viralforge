<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>viralforge | Neural Workspace</title>
    <style>
        :root {
            --mint: #35f0ba;
            --dark: #0a0a0a;
        }

        /* Glow-Visibility for Section Names */
        h3 {
            color: #fff !important; 
            text-shadow: 0 0 10px rgba(53, 240, 186, 0.4); 
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Mobile-Perfect Copy Positioning */
        .copy-pill {
            position: absolute;
            top: 12px !important;
            right: 12px !important;
            background: rgba(53, 240, 186, 0.15) !important;
            backdrop-filter: blur(5px);
            font-weight: 700;
            border: 1px solid var(--mint) !important;
            padding: 4px 12px;
            border-radius: 20px;
            color: var(--mint);
            cursor: pointer;
            z-index: 10;
        }

        /* Neural Pulse Animation for Output Boxes */
        .output-area {
            position: relative;
            background: #111;
            border-radius: 20px;
            padding: 20px;
            margin-top: 15px;
            min-height: 100px;
        }

        .output-area::after {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(90deg, transparent, var(--mint), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            background-size: 200% auto;
            animation: pulseGradient 4s linear infinite;
            pointer-events: none;
        }

        @keyframes pulseGradient {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* General History Styling */
        .history-item {
            background: rgba(255,255,255,0.05);
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
        }
        .history-item span {
            color: var(--mint);
            display: block;
            font-size: 0.8em;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="workspace">
        <h3>System Output</h3>
        <div class="output-area" id="mainOutput">
            <div class="copy-pill" onclick="copyText()">COPY</div>
            </div>

        <div id="gHist"></div>
        <div id="sHist"></div>
    </div>

    <script>
        function addHist(id, txt) {
            const rail = document.getElementById(id);
            if (!rail) return;
            
            const div = document.createElement('div');
            div.className = 'history-item';
            
            // REPLACING ARC_ WITH PROFESSIONAL LOGIC
            const prefix = id === 'gHist' ? 'NEURAL_LOG' : 'SYNC_ID';
            const hex = Math.floor(Math.random()*16777215).toString(16).toUpperCase().substring(0,4);
            
            div.innerHTML = `<span>${prefix}_${hex}</span><p>${txt}</p>`;
            rail.prepend(div);
            
            if(rail.children.length > 4) rail.lastChild.remove();
        }

        function copyText() {
            // Logic for copying text
            console.log("Content copied to clipboard.");
        }
    </script>
</body>
</html>
