<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralForge | OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #35F0BA;
            --violet: #A75FFF;
            --bg: #030508;
            --glass: rgba(15, 18, 25, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            /* Restored Fixed Glow Strength */
            --neon-glow: 0 0 20px rgba(53, 240, 186, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; padding-bottom: 40px; }

        .ambient-neural { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #0d121f 0%, #000 100%); z-index: -1; }
        .container { max-width: 1200px; margin: 0 auto; padding: 25px 20px; }

        /* --- RESTORED BRANDING & CHRONOS --- */
        header { 
            position: sticky; top: 0; z-index: 1000; background: rgba(3, 5, 8, 0.85); 
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { 
            font-family: 'Exo', sans-serif; font-size: 1.4rem; font-weight: 800; letter-spacing: -1px;
            text-shadow: 0 0 15px rgba(53, 240, 186, 0.4); 
        }
        .logo span { background: linear-gradient(90deg, var(--mint), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .chronos-module { text-align: right; font-family: 'JetBrains Mono'; }
        #live-clock { font-size: 11px; color: #fff; font-weight: 700; display: block; }
        #live-date { font-size: 8px; color: var(--mint); text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; }

        /* --- BENTO GRID SYSTEM (FIXED LOOK) --- */
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
        .card { 
            background: var(--glass); 
            border: 1px solid var(--border); 
            border-radius: 35px; 
            padding: 30px; 
            backdrop-filter: blur(30px);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden;
            box-shadow: var(--neon-glow); /* Constant subtle glow as requested */
        }
        .card:hover { border-color: rgba(53, 240, 186, 0.3); }

        .span-8 { grid-column: span 8; } .span-4 { grid-column: span 4; } .span-12 { grid-column: span 12; }

        @media (max-width: 900px) { .span-8, .span-4 { grid-column: span 12; } }

        h3 { font-family: 'Exo', sans-serif; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; color: #fff; margin-bottom: 20px; opacity: 0.9; }

        textarea, input, select { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 20px; padding: 18px; color: #fff; font-size: 0.9rem; outline: none; transition: 0.2s; }
        textarea:focus { border-color: var(--mint); background: rgba(53, 240, 186, 0.02); }

        .btn-forge { width: 100%; padding: 22px; border-radius: 22px; border: none; background: linear-gradient(90deg, var(--mint), var(--violet)); color: #000; font-family: 'Exo', sans-serif; font-weight: 800; font-size: 1rem; text-transform: uppercase; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-forge:active { transform: scale(0.98); }

        /* --- EXPANDED SOCIAL SUITE --- */
        .output-portal { 
            margin-top: 25px; background: rgba(5, 7, 10, 0.6); border: 1px solid var(--border); 
            border-radius: 30px; padding: 30px; position: relative;
            border-left: 3px solid var(--mint); animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .output-ctrl { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; }
        
        /* Specific platform styling for visibility */
        .share-pill { 
            padding: 6px 12px; border-radius: 10px; font-family: 'JetBrains Mono'; font-size: 8px; font-weight: 800;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; cursor: pointer; transition: 0.2s;
        }
        .share-pill:hover { background: #fff; color: #000; }
        .share-x { border-color: #fff; }
        .share-wa { border-color: #25D366; color: #25D366; }
        .share-tg { border-color: #0088cc; color: #0088cc; }
        .copy-pill { background: var(--mint); color: #000; border: none; }

        .res-text { font-size: 1.3rem; font-weight: 500; color: #fff; margin: 20px 0; line-height: 1.5; padding-right: 40px; }
        .res-meta { display: flex; gap: 15px; font-family: 'JetBrains Mono'; font-size: 9px; color: #555; }
        .res-meta b { color: var(--mint); }

        /* --- HISTORY ENGINE --- */
        .history-rail { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; margin-top: 15px; scrollbar-width: none; }
        .history-rail::-webkit-scrollbar { display: none; }
        .history-item { flex: 0 0 160px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 15px; border-radius: 20px; font-size: 10px; cursor: pointer; }
        .history-item span { color: var(--mint); font-family: 'JetBrains Mono'; display: block; margin-bottom: 5px; font-weight: 700; }
        .history-item p { opacity: 0.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    </style>
</head>
<body>

<header>
    <div class="logo">Viral<span>Forge.</span></div>
    <div class="chronos-module">
        <span id="live-clock">00:00:00</span>
        <span id="live-date">MON, APR 13, 2026</span>
    </div>
</header>

<div class="ambient-neural"></div>

<div class="container">
    <div class="grid">
        <div class="card span-8">
            <h3>Elite Ghostwriter</h3>
            <textarea placeholder="Paste dialogue for power gap analysis..." rows="4"></textarea>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:12px;">
                <select><option>Archetype: Ego-Centric</option><option>Archetype: Cold Ghoster</option></select>
                <select><option>Move: Push-Pull
