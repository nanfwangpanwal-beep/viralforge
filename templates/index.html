<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralForge | Social Architecture OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@800&family=Inter:wght@400;600&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #35F0BA;
            --violet: #A75FFF;
            --bg: #000000;
            --glass: rgba(12, 15, 22, 0.95);
            --border: rgba(255, 255, 255, 0.08);
            --neon-glow: 0 0 25px rgba(53, 240, 186, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; min-height: 100vh; }

        /* --- BACKGROUND ATMOSPHERE --- */
        .ambient-neural {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% -20%, #151b2d 0%, #000 100%);
            z-index: -1;
        }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

        /* --- TOP BRANDING --- */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo { font-family: 'Exo', sans-serif; font-size: 1.8rem; letter-spacing: -1.5px; font-weight: 800; }
        .logo span { background: linear-gradient(90deg, var(--mint), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .secure-tag { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--mint); padding: 6px 15px; border: 1px solid var(--border); border-radius: 50px; background: rgba(53, 240, 186, 0.05); }

        /* --- BENTO GRID LAYOUT --- */
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
        .card { 
            background: var(--glass); 
            border: 1px solid var(--border); 
            border-radius: 35px; 
            padding: 30px; 
            backdrop-filter: blur(40px); 
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        .card:hover { border-color: rgba(53, 240, 186, 0.4); transform: translateY(-5px); box-shadow: var(--neon-glow); }

        .span-8 { grid-column: span 8; }
        .span-4 { grid-column: span 4; }
        .span-12 { grid-column: span 12; }

        @media (max-width: 900px) { .span-8, .span-4 { grid-column: span 12; } }

        /* --- UI ELEMENTS --- */
        h3 { font-family: 'Exo', sans-serif; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; color: #555; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        h3::before { content: "◈"; color: var(--mint); }

        textarea, select, input {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 18px; padding: 18px; color: #fff; font-size: 1rem; outline: none; transition: 0.3s;
        }
        textarea:focus { border-color: var(--mint); background: rgba(255,255,255,0.05); }

        .btn-forge {
            width: 100%; padding: 22px; border-radius: 20px; border: none;
            background: linear-gradient(90deg, var(--mint), var(--violet));
            color: #000; font-family: 'Exo', sans-serif; font-weight: 900;
            font-size: 1.1rem; text-transform: uppercase; cursor: pointer; margin-top: 20px;
            transition: 0.4s;
        }
        .btn-forge:hover { filter: brightness(1.1); transform: scale(1.02); }

        /* --- NEURAL SCAN ANIMATION --- */
        .scan-line {
            position: absolute; top: -100%; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to bottom, transparent, rgba(53, 240, 186, 0.05), transparent);
            z-index: 1; pointer-events: none;
        }
        .scanning .scan-line { animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: -50%; } 100% { top: 100%; } }

        /* --- OUTPUT ARCHITECTURE --- */
        .result-area { margin-top: 30px; display: none; animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .stealth-status { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 10px; color: #444; margin-bottom: 12px; }
        .stealth-status span b { color: var(--mint); }

        .reply-display { 
            background: #080a0f; border-left: 4px solid var(--mint); padding: 25px; 
            border-radius: 0 20px 20px 0; font-size: 1.3rem; line-height: 1.4; font-weight: 500;
        }

        .latency-advice {
            margin-top: 15px; background: rgba(167, 95, 255, 0.05); padding: 12px 20px;
            border-radius: 12px; font-family: 'JetBrains Mono'; font-size: 11px; color: var(--violet);
            display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="ambient-neural"></div>

<div class="container">
    <header>
        <div class="logo">Viral<span>Forge.</span></div>
        <div class="secure-tag">SYSTEM: STEALTH_ACTIVE</div>
    </header>

    <div class="grid">
        <div class="card span-8" id="ghostCard">
            <div class="scan-line"></div>
            <h3>Elite Ghostwriter</h3>
            <div style="margin-bottom: 20px;">
                <label style="font-size: 10px; color: #444; text-transform: uppercase; margin-bottom: 8px; display: block;">Chat Context / Recipient Subtext</label>
                <textarea id="chatInput" placeholder="Paste the last few messages... ViralForge will scan for power gaps."></textarea>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label style="font-size: 10px; color: #444; margin-bottom: 8px; display: block;">Target Archetype</label>
                    <select id="archetype">
                        <option>The Ego-Centric (High Power)</option>
                        <option>The Ghoster (Cold Interest)</option>
                        <option>The Negotiator (Logic Based)</option>
                        <option>The Playful Distractor</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 10px; color: #444; margin-bottom: 8px; display: block;">Desired Move</label>
                    <select id="move">
                        <option value="push">Push-Pull Tension</option>
                        <option value="stoic">Stoic Scarcity</option>
                        <option value="humor">Pattern Interrupt</option>
                        <option value="expert">Expert Dominance</option>
                    </select>
                </div>
            </div>
            <button class="btn-forge" onclick="forgeEliteReply()">Forge Stealth Reply</button>

            <div class="result-area" id="resultArea">
                <div class="stealth-status">
                    <span>STEALTH_RATING: <b>99.8% HUMAN</b></span>
                    <span>MOVE: <b>HIGH-VALUE FRAME</b></span>
                </div>
                <div class="reply-display" id="replyText"></div>
                <div class="latency-advice">
                    <span>RESPONSE LATENCY: <b id="timer">18m 42s</b></span>
                    <span>ROI: <b style="color:var(--mint);">+88% CAPITAL</b></span>
                </div>
            </div>
        </div>

        <div class="card span-4">
            <h3>Identity Forge</h3>
            <div style="margin-bottom: 20px;">
                <label style="font-size: 10px; color: #444; margin-bottom: 8px; display: block;">Voice Samples (Paste 3-5 Texts)</label>
                <textarea id="voiceSamples" style="height: 290px;" placeholder="I use lowercase only. I hate emojis. I speak in short sentences."></textarea>
            </div>
            <button class="btn-forge" style="background: transparent; border: 1px solid var(--border); color: #fff;" onclick="alert('Digital Twin Synced.')">Lock Voice</button>
        </div>

        <div class="card span-12">
            <h3>Viral Forge Engine</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; align-items: flex-end;">
                <div>
                    <label style="font-size: 10px; color: #444; margin-bottom: 8px; display: block;">Industry Niche</label>
                    <input type="text" id="niche" placeholder="Finance, SaaS, Luxury...">
                </div>
                <div>
                    <label style="font-size: 10px; color: #444; margin-bottom: 8px; display: block;">Psychological Hook</label>
                    <select id="hookType">
                        <option>The Authority Gap</option>
                        <option>The Negative Constraint</option>
                        <option>Logic Defiance</option>
                    </select>
                </div>
                <button class="btn-forge" style="margin: 0;" onclick="forgeViralHook()">Forge Viral Hook</button>
            </div>
        </div>
    </div>
</div>

<script>
    function forgeEliteReply() {
        const card = document.getElementById('ghostCard');
        const res = document.getElementById('resultArea');
        const text = document.getElementById('replyText');
        const timer = document.getElementById('timer');
        const move = document.getElementById('move').value;

        // Visual Feedback
        card.classList.add('scanning');
        res.style.display = 'none';

        const db = {
            "push": {
                reply: "honestly, i was starting to think you were interesting, but now you’re just being predictable. we might have to rethink this.",
                time: "22m 14s"
            },
            "stoic": {
                reply: "fair enough. i'm heading into a session anyway, so we'll just leave it at that for now.",
                time: "34m 05s"
            },
            "humor": {
                reply: "you’re dangerous. i was supposed to be productive tonight, but now i’m just wondering what else you’re good at besides being a distraction.",
                time: "14m 50s"
            },
            "expert": {
                reply: "i appreciate the enthusiasm, but let's stick to the data—the logic here is what actually changes the game.",
                time: "08m 22s"
            }
        };

        setTimeout(() => {
            card.classList.remove('scanning');
            res.style.display = 'block';
            text.innerText = db[move].reply;
            timer.innerText = db[move].time;
        }, 1800);
    }

    function forgeViralHook() {
        const niche = document.getElementById('niche').value || "Industry";
        alert("VIRALFORGE GENERATED: Why 99% of " + niche + " creators fail—and the 3-minute fix they're ignoring.");
    }
</script>

</body>
</html>
