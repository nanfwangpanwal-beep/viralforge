<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Deposit | viralforge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7fe; padding: 40px 0; }
        .payment-card {
            max-width: 600px;
            margin: auto;
            background: #fff;
            border-radius: 24px;
            border: none;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .summary-box {
            background: #0d6efd;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .payment-methods {
            padding: 30px;
        }
        .method-option {
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .method-option:hover { border-color: #0d6efd; background: #f8fbff; }
        .method-option input[type="radio"] { width: 20px; height: 20px; }
        .btn-pay {
            padding: 15px;
            font-weight: 700;
            border-radius: 12px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="payment-card">
        <div class="summary-box">
            <h5 class="opacity-75">Deposit Amount</h5>
            <h1 class="display-4 fw-bold mb-0">$500.00</h1>
            <p class="mb-0 mt-2">Plan: <strong>Premium Growth</strong></p>
        </div>

        <div class="payment-methods">
            <h5 class="fw-bold mb-4">Select Payment Method</h5>
            
            <form action="dashboard.html">
                <label class="method-option">
                    <input type="radio" name="payMethod" checked>
                    <div>
                        <div class="fw-bold">Debit / Credit Card</div>
                        <div class="small text-muted">Secure payment via Stripe</div>
                    </div>
                </label>

                <label class="method-option">
                    <input type="radio" name="payMethod">
                    <div>
                        <div class="fw-bold">Bank Transfer</div>
                        <div class="small text-muted">Manual verification (24 hours)</div>
                    </div>
                </label>

                <label class="method-option">
                    <input type="radio" name="payMethod">
                    <div>
                        <div class="fw-bold">Cryptocurrency</div>
                        <div class="small text-muted">BTC, ETH, or USDT</div>
                    </div>
                </label>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary w-100 btn-pay">Complete Deposit</button>
                    <p class="text-center text-muted small mt-3">
                        🔒 Secured with 256-bit SSL Encryption
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
