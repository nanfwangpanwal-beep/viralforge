<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ViralForge OS | Elite AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00ffa6;
            --neon-glow: rgba(0, 255, 166, 0.4);
            --bg-deep: #05060a;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            cursor: none;
        }

        body {
            height: 100vh; overflow: hidden;
            background: var(--bg-deep); color: white;
        }

        /* ===== CYBER GRID BACKGROUND ===== */
        .grid-overlay {
            position: fixed; inset: 0;
            background-image: 
                linear-gradient(rgba(0, 255, 166, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 166, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 1000px;
            z-index: 1;
        }

        .aurora {
            position: fixed; inset: -50%; z-index: 0;
            background: radial-gradient(circle at 50% 50%, rgba(0, 255, 166, 0.1), transparent 50%);
            filter: blur(120px);
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse { from { opacity: 0.5; transform: scale(1); } to { opacity: 0.8; transform: scale(1.2); } }

        /* ===== LUXURY CURSOR ===== */
        .cursor {
            position: fixed; width: 6px; height: 6px; background: var(--neon);
            border-radius: 50%; pointer-events: none; z-index: 10000;
            box-shadow: 0 0 15px var(--neon), 0 0 30px var(--neon);
        }

        /* ===== MODAL / AUTH ===== */
        .modal {
            position: fixed; inset: 0; z-index: 1000;
            background: radial-gradient(circle at center, rgba(5, 6, 10, 0.8), #05060a);
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }

        .auth-card {
            background: rgba(10, 11, 16, 0.9);
            border: 1px solid var(--border);
            padding: 50px; border-radius: 40px; width: 420px;
            text-align: center; position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 255, 166, 0.05);
        }

        .neon-line {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 60px; height: 2px; background: var(--neon);
            box-shadow: 0 0 15px var(--neon);
        }

        h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 30px; }
        h1 span { color: var(--neon); text-shadow: 0 0 15px var(--neon-glow); }

        input {
            width: 100%; padding: 18px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border); border-radius: 16px;
            color: white; font-size: 14px; transition: 0.3s;
        }
        input:focus { border-color: var(--neon); outline: none; box-shadow: 0 0 15px rgba(0, 255, 166, 0.1); }

        .btn-neon {
            width: 100%; padding: 18px; border-radius: 16px; border: 1px solid var(--neon);
            background: transparent; color: var(--neon); font-weight: 800;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-neon:hover { background: var(--neon); color: black; box-shadow: 0 0 30px var(--neon-glow); }

        /* ===== MAIN APP INTERFACE ===== */
        .app-container {
            display: none; height: 100vh; position: relative; z-index: 10;
            grid-template-columns: 300px 1fr;
        }

        .sidebar {
            background: rgba(5, 6, 10, 0.6); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); padding: 40px 30px;
        }

        .nav-link {
            padding: 15px; border-radius: 12px; color: #666; font-weight: 600;
            margin-bottom: 10px; transition: 0.3s; cursor: pointer;
        }
        .nav-link.active { color: var(--neon); background: rgba(0, 255, 166, 0.05); }

        .viewport { padding: 60px; display: flex; flex-direction: column; }

        .chat-box {
            flex: 1; background: var(--surface); border: 1px solid var(--border);
            border-radius: 30px; margin-bottom: 30px; padding: 30px;
            overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
        }

        .msg-ai { color: var(--neon); font-size: 18px; line-height: 1.6; font-weight: 500; }

        .input-bar {
            display: flex; gap: 15px; background: rgba(255,255,255,0.02);
            padding: 10px; border-radius: 20px; border: 1px solid var(--border);
        }

        .input-bar input { margin: 0; border: none; background: transparent; }
    </style>
</head>

<body>

    <div class="grid-overlay"></div>
    <div class="aurora"></div>
    <div class="cursor" id="cursor"></div>

    <div class="modal" id="auth">
        <div class="auth-card">
            <div class="neon-line"></div>
            <h1>Viral<span>Forge</span> OS</h1>
            <input type="email" placeholder="ACCESS_EMAIL" id="email">
            <input type="password" placeholder="SYSTEM_KEY">
            <button class="btn-neon" onclick="init()">Initialize System</button>
        </div>
    </div>

    <div class="app-container" id="app">
        <aside class="sidebar">
            <h2 style="font-size: 14px; letter-spacing: 4px; color: #444; margin-bottom: 40px;">CORE_TERMINAL</h2>
            <div class="nav-link active">DASHBOARD</div>
            <div class="nav-link">STRATEGY_GEN</div>
            <div class="nav-link">MARKET_PULSE</div>
            <div class="nav-link">SYSTEM_LOGS</div>
        </aside>

        <main class="viewport">
            <div style="margin-bottom: 30px;">
                <span style="color: var(--neon); font-size: 12px; letter-spacing: 2px;">STATUS: OPTIMAL</span>
                <h2 style="font-size: 32px; font-weight: 800;">Neural Synthesis Engine</h2>
            </div>

            <div class="chat-box" id="feed">
                <div class="msg-ai">> System initialized. Awaiting creative directives...</div>
            </div>

            <div class="input-bar">
                <input type="text" id="userInput" placeholder="COMMAND: Generate viral strategy for..." onkeypress="handle(event)">
                <button class="btn-neon" style="width: 120px; padding: 12px;" onclick="send()">EXECUTE</button>
            </div>
        </main>
    </div>

    <script>
        function init() {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
        }

        const cur = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cur.style.left = e.clientX + 'px';
            cur.style.top = e.clientY + 'px';
        });

        function handle(e) { if(e.key === 'Enter') send(); }

        function send() {
            const input = document.getElementById('userInput');
            const feed = document.getElementById('feed');
            if(!input.value) return;

            feed.innerHTML += `<div style="color: #666;">> ${input.value}</div>`;
            
            const response = document.createElement('div');
            response.className = 'msg-ai';
            response.innerHTML = '> Synthesizing...';
            feed.appendChild(response);

            setTimeout(() => {
                response.innerHTML = '> ANALYSIS COMPLETE: Target high-retention "Negative Hook" strategy identified. Recommendation: "Stop making the $500 mistake in your niche."';
                feed.scrollTop = feed.scrollHeight;
            }, 1000);

            input.value = "";
        }
    </script>
</body>
</html>
