<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | viralforge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 0;
            margin: 0;
        }
        .signup-card {
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            border: none;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.07);
        }
        .brand-name {
            font-weight: 800;
            color: #0d6efd;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .form-control {
            border-radius: 10px;
            padding: 0.75rem 1rem;
        }
        .form-floating > label {
            padding-left: 1rem;
        }
        .btn-primary {
            padding: 0.8rem;
            font-weight: 600;
            border-radius: 10px;
            background-color: #0d6efd;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
            transform: translateY(-1px);
        }
        .input-group-text {
            background: none;
            border-right: none;
        }
        .phone-input {
            border-left: none;
        }
    </style>
</head>
<body>

<div class="signup-card">
    <div class="brand-name">viralforge</div>
    <h3 class="text-center mb-2">Create an Account</h3>
    <p class="text-center text-muted mb-4">Start your investment journey today.</p>
    
    <form>
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="fullName" placeholder="John Doe" required>
            <label for="fullName">Full Name</label>
        </div>

        <div class="form-floating mb-3">
            <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
            <label for="emailInput">Email Address</label>
        </div>

        <div class="form-floating mb-3">
            <input type="tel" class="form-control" id="phoneInput" placeholder="+234..." required>
            <label for="phoneInput">Phone Number</label>
        </div>

        <div class="form-floating mb-3">
            <input type="password" class="form-control" id="passInput" placeholder="Password" required>
            <label for="passInput">Create Password</label>
        </div>

        <div class="form-check mb-4 small text-muted">
            <input class="form-check-input" type="checkbox" value="" id="termsCheck" required>
            <label class="form-check-label" for="termsCheck">
                I agree to the <a href="#" class="text-decoration-none">Terms of Service</a> and <a href="#" class="text-decoration-none">Privacy Policy</a>.
            </label>
        </div>

        <button class="w-100 btn btn-primary mb-3" type="submit">Create Account</button>
    </form>

    <p class="text-center mt-3 mb-0 small">
        Already using viralforge? <a href="index.html" class="text-primary fw-bold text-decoration-none">Log In</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
