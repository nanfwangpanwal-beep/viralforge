<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralForge X | Elite Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-grad: linear-gradient(90deg, #00ffa6 0%, #00d4ff 50%, #d946ef 100%);
            --bg-obsidian: #030712;
            --glass-card: rgba(17, 24, 39, 0.75);
            --border-glow: rgba(0, 255, 166, 0.2);
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { 
            background: var(--bg-obsidian); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- NEURAL PLEXUS CANVAS --- */
        #plexus { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.6; }

        /* --- RESPONSIVE COMMAND CENTER --- */
        .command-center {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 1000px;
            background: var(--glass-card);
            backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid var(--border-glow);
            border-radius: 40px;
            padding: clamp(1.5rem, 5vw, 4rem);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 50px rgba(0, 255, 166, 0.05);
        }

        /* Header Info */
        .sys-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--text-muted);
        }
        .status-dot { height: 8px; width: 8px; background: #00ffa6; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #00ffa6; }

        h1 {
            font-size: clamp(2.8rem, 8vw, 5rem);
            font-weight: 800;
            line-height: 0.85;
            letter-spacing: -4px;
            margin-bottom: 1rem;
            background: #fff;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h1 span { background: var(--primary-grad); -webkit-background-clip: text; }

        .tagline { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 3rem; max-width: 500px; }

        /* --- BENTO INPUT GRID --- */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 1.5rem;
        }

        @media (min-width: 768px) {
            .input-grid { grid-template-columns: 2fr 1fr 1fr; }
            .span-full { grid-column: span 3; }
        }

        .field { position: relative; }
        .label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            text-transform: uppercase;
            color: #4b5563;
            margin-bottom: 8px;
            padding-left: 5px;
        }

        input, select {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-glow);
            padding: 20px;
            border-radius: 20px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus, select:focus { border-color: #00ffa6; background: rgba(0, 255, 166, 0.05); }

        /* --- THE ULTIMATE ACTION BUTTON --- */
        .activate-btn {
            width: 100%;
            padding: 24px;
            border: none;
            border-radius: 24px;
            background: var(--primary-grad);
            color: #000;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            box-shadow: 0 10px 40px rgba(0, 255, 166, 0.2);
        }

        .activate-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 15px 50px rgba(217, 70, 239, 0.3);
        }

        /* Results Area */
        #results { margin-top: 3rem; display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) { #results { grid-template-columns: 1fr 1fr; } }

        .concept-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-glow);
            padding: 25px;
            border-radius: 25px;
            transition: 0.3s;
        }
        .concept-box:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<canvas id="plexus"></canvas>

<div class="command-center">
    <div class="sys-header">
        <div><span class="status-dot"></span> CORE SYSTEM ONLINE</div>
        <div>VIRALFORGE X-SERIES</div>
    </div>

    <h1>Viral<span>Forge</span></h1>
    <p class="tagline">The world's most advanced intelligence engine for elite creators.</p>

    <div class="input-grid">
        <div class="field">
            <span class="label">Niche / Target Industry</span>
            <input type="text" id="niche" placeholder="e.g. Fintech, SaaS, Luxury">
        </div>
        <div class="field">
            <span class="label">Trigger</span>
            <select id="trigger">
                <option>Hype</option>
                <option>Curiosity</option>
                <option>Authority</option>
            </select>
        </div>
        <div class="field">
            <span class="label">Channel</span>
            <select id="channel">
                <option>TikTok</option>
                <option>IG Reels</option>
                <option>YT Shorts</option>
            </select>
        </div>
    </div>

    <button class="activate-btn" onclick="activateForge()">Activate Forge Engine</button>

    <div id="results"></div>
</div>

<script>
    // --- PLEXUS ENGINE ---
    const canvas = document.getElementById('plexus');
    const ctx = canvas.getContext('2d');
    let points = [];
    const maxPoints = 80;

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        points = [];
        for(let i=0; i<maxPoints; i++) {
            points.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5
            });
        }
    }

    function animate() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        points.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy;
            if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
            if(p.y < 0 || p.y > canvas.height) p.vy *= -1;

            points.slice(i + 1).forEach(p2 => {
                let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                if(dist < 150) {
                    ctx.strokeStyle = `rgba(0, 255, 166, ${1 - dist/150})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                }
            });
        });
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', init);
    init(); animate();

    // --- FORGE LOGIC ---
    function activateForge() {
        const btn = document.querySelector('.activate-btn');
        const res = document.getElementById('results');
        const n = document.getElementById('niche').value;
        if(!n) return;

        btn.innerText = "CALCULATING VIRALITY...";
        res.innerHTML = "";

        setTimeout(() => {
            btn.innerText = "ACTIVATE FORGE ENGINE";
            const concepts = [
                `Why 99% of ${n} startups fail in the first 30 days.`,
                `The "Hidden Truth" about ${n} nobody tells you.`
            ];
            concepts.forEach(c => {
                const div = document.createElement('div');
                div.className = "concept-box";
                div.innerHTML = `<div style="color:#00ffa6; font-size:0.7rem; margin-bottom:10px;">GENERATED STRATEGY</div><div style="font-weight:600;">${c}</div>`;
                res.appendChild(div);
            });
        }, 1500);
    }
</script>

</body>
</html>
