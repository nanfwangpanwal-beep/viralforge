<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralForge OS | Intelligence Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Outfit:wght@300;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #00ffa6;
            --accent-glow: rgba(0, 255, 166, 0.4);
            --bg: #030408;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #8e9196;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; cursor: default; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1200px;
        }

        /* Animated Nebula Background */
        .nebula {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(0, 255, 166, 0.07) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 195, 255, 0.07) 0%, transparent 40%);
            filter: blur(100px);
            animation: drift 15s infinite alternate ease-in-out;
        }

        @keyframes drift { from { transform: scale(1); } to { transform: scale(1.1) translate(10px, 10px); } }

        /* The Main Suite Card */
        .suite-container {
            width: 95%; max-width: 1000px; height: 650px;
            background: rgba(10, 11, 15, 0.8);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 32px;
            display: flex;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), inset 0 0 40px rgba(255,255,255,0.02);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 240px; border-right: 1px solid var(--border);
            padding: 30px 20px; display: flex; flex-direction: column;
        }

        .brand { font-family: 'Outfit'; font-weight: 700; font-size: 22px; letter-spacing: -1px; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .brand-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }

        .nav-item {
            padding: 12px 15px; border-radius: 12px; font-size: 14px; font-weight: 500;
            color: var(--text-dim); margin-bottom: 8px; transition: 0.3s;
        }
        .nav-item.active { background: var(--surface); color: var(--accent); border: 1px solid var(--border); }
        .nav-item:hover:not(.active) { color: #fff; background: rgba(255,255,255,0.02); }

        /* Main Viewport */
        .viewport { flex: 1; padding: 40px; display: flex; flex-direction: column; overflow-y: auto; }

        .header { margin-bottom: 30px; }
        .header h1 { font-family: 'Outfit'; font-size: 32px; letter-spacing: -1px; }
        .header p { color: var(--text-dim); font-size: 14px; }

        /* Input Controls */
        .controls-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 25px; }
        
        .input-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 10px; }
        
        input, select {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            padding: 18px; border-radius: 16px; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 255, 166, 0.1); }

        /* The Button */
        .forge-btn {
            width: 100%; padding: 20px; border: none; border-radius: 18px;
            background: #fff; color: #000; font-weight: 800; font-size: 15px;
            cursor: pointer; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative; overflow: hidden;
        }
        .forge-btn:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 20px 40px var(--accent-glow); }
        .forge-btn:active { transform: translateY(0); }

        /* Results Area */
        .results-window { margin-top: 30px; display: none; flex-direction: column; gap: 12px; }
        
        .hook-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 20px; border-radius: 20px; display: flex; justify-content: space-between;
            align-items: center; animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .copy-btn {
            background: rgba(0, 255, 166, 0.1); border: 1px solid var(--accent);
            color: var(--accent); padding: 8px 15px; border-radius: 10px; font-size: 12px;
            font-weight: 700; cursor: pointer;
        }

        /* Diagnostics / Loading */
        .diagnostics {
            display: none; font-family: monospace; font-size: 12px; color: var(--accent);
            margin-top: 20px; opacity: 0.7;
        }

        /* Mobile Optimization */
        @media (max-width: 800px) {
            .suite-container { flex-direction: column; height: auto; }
            .sidebar { width: 100%; flex-direction: row; border-right: none; border-bottom: 1px solid var(--border); overflow-x: auto; }
            .nav-item { white-space: nowrap; margin-bottom: 0; margin-right: 10px; }
            .controls-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

    <div class="nebula"></div>

    <div class="suite-container" id="mainCard">
        <aside class="sidebar">
            <div class="brand"><div class="brand-dot"></div> ViralForge.OS</div>
            <div class="nav-item active">Neural Terminal</div>
            <div class="nav-item">Content Matrix</div>
            <div class="nav-item">Trend Arbitrage</div>
            <div class="nav-item">Asset Library</div>
            <div class="nav-item" style="margin-top: auto;">System Settings</div>
        </aside>

        <main class="viewport">
            <div class="header">
                <h1>Executive Suite</h1>
                <p>Advanced algorithmic hook synthesis for global creators.</p>
            </div>

            <div class="controls-grid">
                <div class="input-group">
                    <label>Target Niche</label>
                    <input type="text" id="niche" placeholder="e.g. Luxury Finance, AI SaaS">
                </div>
                <div class="input-group">
                    <label>Strategy Mode</label>
                    <select id="mode">
                        <option>Authoritative</option>
                        <option>Controversial</option>
                        <option>Curiosity-Gap</option>
                    </select>
                </div>
            </div>

            <button class="forge-btn" id="forgeBtn" onclick="initiateForge()">INITIALIZE SYNTHESIS</button>

            <div class="diagnostics" id="logs">
                > Initializing Neural Network...<br>
                > Scraping Global Trends...<br>
                > Analyzing Psychological Triggers...
            </div>

            <div class="results-window" id="results">
                </div>
        </main>
    </div>

    <script>
        const card = document.getElementById('mainCard');
        
        // 3D Tilt Effect
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        async function initiateForge() {
            const niche = document.getElementById('niche').value;
            if(!niche) return alert("System requires niche input.");

            const btn = document.getElementById('forgeBtn');
            const logs = document.getElementById('logs');
            const results = document.getElementById('results');

            btn.innerText = "FORGING...";
            btn.disabled = true;
            logs.style.display = "block";
            results.style.display = "none";

            try {
                const response = await fetch(`/generate?niche=${encodeURIComponent(niche)}`);
                const data = await response.json();

                setTimeout(() => {
                    logs.style.display = "none";
                    results.style.display = "flex";
                    btn.innerText = "INITIALIZE SYNTHESIS";
                    btn.disabled = false;
                    results.innerHTML = "";

                    const hooks = Array.isArray(data.hooks) ? data.hooks : [data.hook];
                    hooks.forEach(h => {
                        const div = document.createElement('div');
                        div.className = 'hook-card';
                        div.innerHTML = `
                            <div style="font-weight: 600; font-size: 15px;">${h}</div>
                            <button class="copy-btn" onclick="copyText('${h.replace(/'/g, "\\'")}')">COPY</button>
                        `;
                        results.appendChild(div);
                    });
                }, 1500); // Simulate processing for "Premium" feel

            } catch (err) {
                btn.innerText = "ENGINE ERROR";
                logs.innerText = "> Failed to connect to server.";
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard.");
        }
    </script>
</body>
</html>
