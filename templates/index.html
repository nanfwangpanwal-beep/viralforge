<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralForge | Social Architecture OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #35F0BA;
            --violet: #A75FFF;
            --bg: #030508;
            --card-bg: rgba(15, 18, 25, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            --glow: 0 0 15px rgba(53, 240, 186, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; line-height: 1.6; overflow-x: hidden; }

        /* --- GLOWING HEADER --- */
        header { 
            position: sticky; top: 0; z-index: 1000; background: rgba(3, 5, 8, 0.9); 
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { 
            font-family: 'Exo', sans-serif; font-size: 1.4rem; font-weight: 800; letter-spacing: -1px;
            text-shadow: 0 0 12px rgba(53, 240, 186, 0.5); 
        }
        .logo span { background: linear-gradient(90deg, var(--mint), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .chronos-module { text-align: right; font-family: 'JetBrains Mono'; }
        #live-clock { font-size: 11px; color: #fff; font-weight: 700; display: block; }
        #live-date { font-size: 8px; color: var(--mint); text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* --- GRID SYSTEM --- */
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 15px; }
        .card { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 30px; 
            padding: 25px; backdrop-filter: blur(25px); position: relative; overflow: hidden;
            transition: 0.3s ease;
        }
        .span-8 { grid-column: span 8; } .span-4 { grid-column: span 4; } .span-12 { grid-column: span 12; }

        @media (max-width: 900px) { 
            .span-8, .span-4 { grid-column: span 12; } 
            .card { padding: 20px; border-radius: 25px; }
        }

        /* Section Glow Enhancements */
        h3 {
            color: #fff !important;
            text-shadow: 0 0 10px rgba(53, 240, 186, 0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: 'Exo', sans-serif;
            margin-bottom: 20px;
        }

        /* --- INPUTS --- */
        textarea, select, input { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
            border-radius: 15px; padding: 15px; color: #fff; font-size: 0.9rem; outline: none;
        }

        .btn-forge { 
            width: 100%; padding: 18px; border-radius: 15px; border: none; 
            background: linear-gradient(90deg, var(--mint), var(--violet)); 
            color: #000; font-family: 'Exo', sans-serif; font-weight: 800; 
            text-transform: uppercase; cursor: pointer; margin-top: 15px;
        }

        /* Professional Output Container with Neural Pulse */
        .output-area {
            position: relative;
            background: rgba(5, 7, 10, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 30px;
            margin-top: 20px;
            overflow: hidden;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        /* The Animated Pulse Border */
        .output-area::after {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 25px;
            padding: 1px;
            background: linear-gradient(90deg, transparent, var(--mint), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            background-size: 200% auto;
            animation: pulseGradient 3s linear infinite;
            pointer-events: none;
        }

        @keyframes pulseGradient {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        /* Mobile-Perfect Copy Positioning */
        .copy-pill {
            position: absolute;
            top: 12px !important;
            right: 12px !important;
            background: rgba(53, 240, 186, 0.15) !important;
            backdrop-filter: blur(5px);
            color: var(--mint);
            font-family: 'JetBrains Mono';
            font-size: 9px;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 5;
            font-weight: 700;
            border: 1px solid var(--mint) !important;
        }

        /* Materialize Glitch Animation */
        @keyframes textGlitch {
            0% { opacity: 0; transform: skewX(10deg); filter: blur(2px); }
            20% { opacity: 0.8; transform: skewX(-10deg); filter: blur(0px); }
            40% { opacity: 0.5; transform: skewX(5deg); }
            100% { opacity: 1; transform: skewX(0deg); }
        }

        .glitch-text {
            animation: textGlitch 0.4s ease-out;
            color: #eee;
            line-height: 1.5;
            font-size: 1.1rem;
            margin-top: 10px;
            padding-right: 60px;
        }

        /* Professional ID Tags */
        .id-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--mint);
            background: rgba(53, 240, 186, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: inline-block;
        }

        .res-strategy { margin-top: 15px; font-size: 11px; color: #555; border-top: 1px solid var(--border); padding-top: 10px; }
        .res-strategy mark { background: transparent; color: var(--mint); font-weight: 600; }

        /* --- HISTORY --- */
        .history-rail { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .history-item { 
            flex: 0 0 180px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); 
            padding: 12px; border-radius: 15px; font-size: 10px;
        }

        /* --- NOTIFICATIONS --- */
        #notif-box { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; width: 90%; max-width: 400px; }
        .toast { background: var(--card-bg); border: 1px solid var(--mint); padding: 12px; border-radius: 12px; font-size: 11px; text-align: center; box-shadow: var(--glow); animation: slideUp 0.3s ease; }

        /* --- LOADING --- */
        .loader { position: absolute; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; z-index: 50; }
    </style>
</head>
<body>

<header>
    <div class="logo">Viral<span>Forge.</span></div>
    <div class="chronos-module">
        <span id="live-clock">00:00:00</span>
        <span id="live-date">SYNCING...</span>
    </div>
</header>

<div id="notif-box"></div>

<div class="container">
    <div class="grid">
        <div class="card span-8" id="ghostCard">
            <div class="loader" id="gLoad"><span style="font-family:'JetBrains Mono'; color:var(--mint); font-size:10px;">NEURAL_SCAN_ACTIVE</span></div>
            <h3>Elite Ghostwriter</h3>
            <textarea id="gIn" placeholder="Input target dialogue..." rows="4"></textarea>
            <button class="btn-forge" onclick="runForge('ghost')">Forge Stealth Reply</button>
            <div class="history-rail" id="gHist"></div>
            
            <div class="output-area" id="gOut">
                <div class="copy-pill" onclick="doCopy('gRes')">COPY</div>
                <div class="glitch-text" id="gRes">...</div>
                <div class="res-strategy" id="gStrat">...</div>
            </div>
        </div>

        <div class="card span-4">
            <h3>Identity Forge</h3>
            <textarea id="vIn" placeholder="Feed voice samples..." style="height:150px;"></textarea>
            <button class="btn-forge" style="background:transparent; border:1px solid var(--border); color:#fff;" onclick="toast('Neural Identity Locked')">Lock Voice</button>
        </div>

        <div class="card span-12" id="viralCard">
            <div class="loader" id="vLoad"><span style="font-family:'JetBrains Mono'; color:var(--mint); font-size:10px;">VIRAL_CALIBRATION_ACTIVE</span></div>
            <h3>Viral Forge Engine</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap:10px;">
                <input type="text" id="nIn" placeholder="Niche...">
                <select><option>Authority Gap</option><option>Pattern Interrupt</option></select>
                <button class="btn-forge" style="margin:0; padding:15px 30px;" onclick="runForge('viral')">Forge Hook</button>
            </div>
            <div class="history-rail" id="vHist"></div>
            
            <div class="output-area" id="vOut">
                <div class="copy-pill" onclick="doCopy('vRes')">COPY</div>
                <div class="glitch-text" id="vRes">...</div>
                <div class="res-strategy" id="vStrat">...</div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', {hour12:false});
        document.getElementById('live-date').innerText = now.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}).toUpperCase();
    }
    setInterval(updateClock, 1000); updateClock();

    function toast(msg) {
        const b = document.getElementById('notif-box');
        b.innerHTML = `<div class="toast">[SYS] ${msg}</div>`;
        setTimeout(() => b.innerHTML = '', 3000);
    }

    function saveToCloud(id, txt) {
        // Placeholder for cloud saving logic
        console.log(`Saving ${id}: ${txt}`);
    }

    function addHist(id, txt) {
        const rail = document.getElementById(id);
        if (!rail) return;

        const div = document.createElement('div');
        div.className = 'history-item';

        // High-end ID Generation
        const prefix = id === 'gHist' ? 'NEURAL_LOG' : 'SYNC_ID';
        const hex = Math.floor(Math.random() * 65535).toString(16).toUpperCase().padStart(4, '0');

        div.innerHTML = `
            <div style="margin-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 10px;">
                <span class="id-tag">${prefix}_${hex}</span>
                <p style="font-size: 11px; color: #888;">${txt}</p>
            </div>
        `;

        rail.prepend(div);
        if (rail.children.length > 5) rail.lastChild.remove();
        
        saveToCloud(id, txt);
    }

    function runForge(type) {
        const load = document.getElementById(type === 'ghost' ? 'gLoad' : 'vLoad');
        const out = document.getElementById(type === 'ghost' ? 'gOut' : 'vOut');
        const resText = document.getElementById(type === 'ghost' ? 'gRes' : 'vRes');
        const resStrat = document.getElementById(type === 'ghost' ? 'gStrat' : 'vStrat');
        
        load.style.display = 'flex';
        out.style.display = 'none';

        setTimeout(() => {
            load.style.display = 'none';
            out.style.display = 'block';
            
            let forgedContent = "";
            let strategy = "";

            if(type === 'ghost') {
                forgedContent = "honestly, i was starting to think you were interesting, but you're being predictable.";
                strategy = "Uses <mark>Pattern Interrupt</mark> to reset social dynamics.";
                addHist('gHist', forgedContent);
            } else {
                forgedContent = "Why 99% of founders fail—and the 3-minute fix they ignore.";
                strategy = "Leverages <mark>Authority Gap</mark> for high-click conversion.";
                addHist('vHist', forgedContent);
            }

            resText.innerText = forgedContent;
            resStrat.innerHTML = strategy;
            toast("Generation Complete");
        }, 1500);
    }

    function doCopy(id) {
        navigator.clipboard.writeText(document.getElementById(id).innerText);
        toast("Copied to Clipboard");
    }
</script>

</body>
</html>
