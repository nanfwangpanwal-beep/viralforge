<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralForge | OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #35F0BA;
            --violet: #A75FFF;
            --bg: #030508;
            --card-bg: rgba(15, 18, 25, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            --neon: 0 0 20px rgba(53, 240, 186, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; line-height: 1.6; overflow-x: hidden; }

        /* --- LUXURIOUS STICKY HEADER --- */
        header { 
            position: sticky; top: 0; z-index: 1000; background: rgba(3, 5, 8, 0.85); 
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            padding: 12px 25px; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: 'Exo', sans-serif; font-size: 1.4rem; font-weight: 800; letter-spacing: -1px; }
        .logo span { background: linear-gradient(90deg, var(--mint), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .chronos-module { text-align: right; font-family: 'JetBrains Mono'; }
        #live-clock { font-size: 11px; color: #fff; font-weight: 700; display: block; letter-spacing: 1px; }
        #live-date { font-size: 8px; color: var(--mint); text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; }
        .sync-dot { display: inline-block; width: 4px; height: 4px; background: var(--mint); border-radius: 50%; margin-right: 5px; animation: blink 2s infinite; box-shadow: 0 0 8px var(--mint); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .container { max-width: 1100px; margin: 0 auto; padding: 25px 15px; }

        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 15px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 24px; position: relative; transition: 0.3s ease; overflow: hidden; }
        .card:hover { border-color: rgba(53, 240, 186, 0.25); box-shadow: var(--neon); }
        .span-8 { grid-column: span 8; } .span-4 { grid-column: span 4; } .span-12 { grid-column: span 12; }

        @media (max-width: 850px) { .span-8, .span-4 { grid-column: span 12; } }

        h3 { font-family: 'Exo', sans-serif; font-size: 0.75rem; letter-spacing: 1.5px; text-transform: uppercase; color: #666; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
        h3::before { content: ""; width: 6px; height: 6px; background: var(--mint); border-radius: 50%; box-shadow: 0 0 10px var(--mint); }

        textarea, select, input { 
            width: 100%; background: rgba(255,255,255,0.02); border: 1px solid var(--border); 
            border-radius: 16px; padding: 15px; color: #fff; font-size: 0.95rem; outline: none; transition: 0.2s;
        }
        textarea:focus, input:focus { border-color: var(--mint); background: rgba(255,255,255,0.04); }

        .btn-forge { 
            width: 100%; padding: 18px; border-radius: 16px; border: none; 
            background: linear-gradient(90deg, var(--mint), var(--violet)); 
            color: #000; font-family: 'Exo', sans-serif; font-weight: 800; 
            font-size: 0.95rem; text-transform: uppercase; cursor: pointer; margin-top: 15px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-forge:active { transform: scale(0.96); }

        .neural-accuracy { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .accuracy-label { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 9px; color: #444; margin-bottom: 8px; }
        .accuracy-track { width: 100%; height: 3px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        #accuracyFill { width: 0%; height: 100%; background: var(--mint); transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--mint); }

        .history-slider { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .history-slider::-webkit-scrollbar { display: none; }
        .history-blob { 
            flex: 0 0 145px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); 
            padding: 12px; border-radius: 18px; font-size: 10px; cursor: pointer; transition: 0.2s;
        }
        .history-blob:hover { border-color: var(--mint); background: rgba(53, 240, 186, 0.03); }
        .history-blob span { font-family: 'JetBrains Mono'; color: var(--mint); display: block; margin-bottom: 4px; }
        .history-blob p { color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .output-portal { 
            margin-top: 25px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); 
            border-radius: 25px; padding: 25px; position: relative; display: none;
            border-left: 3px solid var(--mint); animation: slideUp 0.4s ease forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .output-ctrl { position: absolute; top: 20px; right: 20px; }
        .copy-pill { 
            background: rgba(53, 240, 186, 0.1); border: 1px solid rgba(53, 240, 186, 0.2);
            color: var(--mint); font-family: 'JetBrains Mono'; font-size: 8px; 
            padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .copy-pill:hover { background: var(--mint); color: #000; }

        .res-body { font-size: 1.25rem; font-weight: 500; margin: 15px 0; color: #eee; }
        .res-meta { font-family: 'JetBrains Mono'; font-size: 10px; color: #444; display: flex; gap: 15px; }
        .res-meta b { color: var(--mint); }
        
        .strategy-box { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); font-size: 11px; color: #666; }
        .strategy-box mark { background: transparent; color: var(--mint); font-weight: 600; }

        #notification-host { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .stealth-notif { 
            background: var(--card-bg); border: 1px solid var(--border); border-left: 3px solid var(--violet);
            padding: 12px 20px; border-radius: 12px; backdrop-filter: blur(10px);
            font-size: 11px; font-weight: 600; color: #fff; letter-spacing: 0.5px;
            animation: toastIn 0.3s ease forwards;
        }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .loading-shimmer {
            position: absolute; inset: 0; background: var(--card-bg); z-index: 10;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 28px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Viral<span>Forge.</span></div>
    <div class="chronos-module">
        <span id="live-clock">00:00:00</span>
        <span id="live-date"><span class="sync-dot"></span>CONNECTING...</span>
    </div>
</header>

<div id="notification-host"></div>

<div class="container">
    <div class="grid">
        <div class="card span-8" id="ghostCard">
            <div class="loading-shimmer" id="loader">
                <span style="font-family:'JetBrains Mono'; font-size:10px; color:var(--mint); letter-spacing: 2px;">NEURAL_SCAN_ACTIVE</span>
            </div>
            <h3>Elite Ghostwriter</h3>
            <textarea id="ghostIn" placeholder="Paste chat history for power gap analysis..." rows="4" oninput="updateAccuracy()"></textarea>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                <select id="arc"><option>Archetype: Ego-Centric</option><option>Archetype: Cold Negotiator</option></select>
                <select id="move"><option>Move: Push-Pull Tension</option><option>Move: Stoic Scarcity</option></select>
            </div>

            <div class="history-slider" id="ghostHist"></div>
            <button class="btn-forge" onclick="forge('ghost')">Forge Stealth Reply</button>
        </div>

        <div class="card span-4">
            <h3>Identity Forge</h3>
            <textarea id="voiceIn" placeholder="Paste your writing samples..." style="height:120px;"></textarea>
            <div class="neural-accuracy">
                <div class="accuracy-label"><span>NEURAL_ACCURACY</span><span id="accNum">0%</span></div>
                <div class="accuracy-track"><div id="accuracyFill"></div></div>
            </div>
            <button class="btn-forge" style="background:transparent; border:1px solid var(--border); color:#fff;" onclick="lockVoice()">Lock Neural Voice</button>
        </div>

        <div class="card span-12">
            <h3>Viral Forge Engine</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap:10px;">
                <input type="text" id="niche" placeholder="Niche (SaaS, AI, Luxury...)">
                <select id="hook"><option>Hook: Authority Gap</option><option>Hook: Pattern Interrupt</option></select>
                <button class="btn-forge" style="margin:0; padding:15px 30px;" onclick="forge('viral')">Forge Hook</button>
            </div>
            <div class="history-slider" id="viralHist"></div>

            <div class="output-portal" id="outBox">
                <div class="output-ctrl"><button class="copy-pill" onclick="copy()">COPY_TEXT</button></div>
                <div class="res-meta">
                    <span>STEALTH_RATING: <b>99.8%</b></span>
                    <span>ENGINE_SYNC: <b>STARK_V5</b></span>
                </div>
                <div class="res-body" id="resText"></div>
                <div class="strategy-box" id="resStrategy"></div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const dateStr = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: '2-digit', year: 'numeric' });
        document.getElementById('live-clock').innerText = timeStr;
        document.getElementById('live-date').innerHTML = `<span class="sync-dot"></span>${dateStr}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function notify(message) {
        const host = document.getElementById('notification-host');
        const n = document.createElement('div');
        n.className = 'stealth-notif';
        n.innerText = `[SYS] ${message}`;
        host.appendChild(n);
        setTimeout(() => { n.style.opacity = '0'; setTimeout(() => n.remove(), 500); }, 3000);
    }

    function updateAccuracy() {
        const val = Math.min(document.getElementById('ghostIn').value.length / 2, 94);
        document.getElementById('accuracyFill').style.width = val + '%';
        document.getElementById('accNum').innerText = Math.floor(val) + '%';
    }

    function lockVoice() {
        document.getElementById('accuracyFill').style.width = '94%';
        document.getElementById('accNum').innerText = '94%';
        notify("Neural Mapping Confirmed");
    }

    function forge(type) {
        const loader = document.getElementById('loader');
        const box = document.getElementById('outBox');
        loader.style.display = 'flex';
        
        setTimeout(() => {
            loader.style.display = 'none';
            box.style.display = 'block';
            
            if(type === 'ghost') {
                document.getElementById('resText').innerText = "honestly, i was starting to think you were interesting, but now you’re just being predictable.";
                document.getElementById('resStrategy').innerHTML = "Calibrated for <mark>Push-Pull</mark>. Uses an <mark>Authority Gap</mark> to force the recipient to re-qualify their interest.";
                addHist('ghostHist', "honestly, i was starting...");
            } else {
                const n = document.getElementById('niche').value || 'Industry';
                document.getElementById('resText').innerText = `Why 99% of ${n} founders fail—and the 3-minute fix they're ignoring.`;
                document.getElementById('resStrategy').innerHTML = "Uses <mark>Logic Defiance</mark> to stop the scroll. Ideal for high-intent professional audiences.";
                addHist('viralHist', "Why 99% of founders...");
            }
            notify("Response Generation Complete");
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }, 1500);
    }

    function addHist(id, txt) {
        const rail = document.getElementById(id);
        const item = document.createElement('div');
        item.className = 'history-blob';
        item.innerHTML = `<span>ARCH_SYNC</span><p>${txt}</p>`;
        rail.prepend(item);
        if(rail.children.length > 5) rail.lastChild.remove();
    }

    function copy() {
        const text = document.getElementById('resText').innerText;
        if(text) {
            navigator.clipboard.writeText(text);
            notify("Data Copied to Clipboard");
        }
    }
</script>

</body>
</html>
