<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralForge | Neural Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --mint: #35F0BA; --cyan: #00E5FF; --bg: #020406; --glass: rgba(10, 14, 20, 0.9); --border: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0; }
        .auth-card { width: 90%; max-width: 420px; background: var(--glass); border: 1px solid var(--border); border-radius: 40px; padding: 50px; backdrop-filter: blur(40px); text-align: center; position: relative; }
        .logo { font-family: 'Exo', sans-serif; font-size: 2.2rem; font-weight: 800; margin-bottom: 40px; letter-spacing: -1px; }
        .logo span { background: linear-gradient(135deg, var(--mint), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 20px; padding: 18px; color: #fff; margin-bottom: 15px; outline: none; }
        .btn-access { width: 100%; padding: 20px; border-radius: 20px; border: none; background: linear-gradient(135deg, var(--mint), var(--cyan)); color: #000; font-family: 'Exo', sans-serif; font-weight: 800; cursor: pointer; }
        #sync-overlay { position: absolute; inset: 0; background: var(--bg); border-radius: 40px; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .sync-spinner { width: 30px; height: 30px; border: 2px solid rgba(53, 240, 186, 0.1); border-top: 2px solid var(--mint); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="auth-card">
    <div id="sync-overlay">
        <div class="sync-spinner"></div>
        <div style="font-family:'JetBrains Mono'; font-size:10px; color:var(--mint); margin-top:15px;">ESTABLISHING_LINK...</div>
    </div>
    <div class="logo">Viral<span>Forge.</span></div>
    <input type="email" placeholder="Neural ID">
    <input type="password" placeholder="Access Code">
    <button class="btn-access" onclick="enter()">Enter Terminal</button>
</div>
<script>
    function enter() {
        document.getElementById('sync-overlay').style.display = 'flex';
        setTimeout(() => { window.location.href = 'index.html'; }, 1200);
    }
</script>
</body>
</html>
