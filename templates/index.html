<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralForge OS | Elite AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ffa6;
            --primary-glow: rgba(0, 255, 166, 0.3);
            --secondary: #00d4ff;
            --bg: #02040a;
            --card: rgba(10, 14, 23, 0.8);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; cursor: default; }

        body {
            background-color: var(--bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            perspective: 1500px;
        }

        /* ===== CYBERNETIC BACKGROUND ===== */
        .bg-mesh {
            position: fixed; inset: 0; z-index: -1;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            opacity: 0.2;
        }

        .orb {
            position: fixed; width: 400px; height: 400px;
            background: var(--primary-glow);
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
            animation: float 20s infinite alternate;
        }

        @keyframes float {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        /* ===== MAIN CONTAINER ===== */
        .app-shell {
            width: 100%;
            max-width: 850px;
            background: var(--card);
            backdrop-filter: blur(50px) saturate(150%);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 40px 100px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        /* Top Bar Branding */
        .top-bar {
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-pill {
            font-size: 10px;
            letter-spacing: 2px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(0, 255, 166, 0.05);
            color: var(--primary);
            border: 1px solid rgba(0, 255, 166, 0.2);
            font-weight: 800;
        }

        /* Main Content */
        .content { padding: 50px 60px; }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 4rem;
            letter-spacing: -3px;
            line-height: 0.9;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff 40%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { color: #64748b; font-size: 1.1rem; margin-bottom: 40px; max-width: 500px; }

        /* Input Controls */
        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .full-width { grid-column: span 2; }

        .field-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #475569;
            margin-bottom: 12px;
            display: block;
            font-weight: 700;
        }

        input, select {
            width: 100%;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 20px;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(0, 255, 166, 0.03);
            box-shadow: 0 0 30px rgba(0, 255, 166, 0.1);
            outline: none;
        }

        /* Global Ready Button */
        .forge-trigger {
            width: 100%;
            padding: 25px;
            border-radius: 24px;
            border: none;
            background: #fff;
            color: #000;
            font-family: 'Space Grotesk';
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
        }

        .forge-trigger:hover {
            background: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px var(--primary-glow);
        }

        /* Results Visualization */
        .result-card {
            margin-top: 30px;
            background: rgba(255,255,255,0.01);
            border: 1px dashed var(--border);
            padding: 30px;
            border-radius: 30px;
            animation: emerge 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes emerge {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .copy-btn {
            float: right;
            padding: 8px 16px;
            border-radius: 12px;
            background: rgba(0, 255, 166, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
        }

        .loading-bar {
            height: 2px; width: 0%;
            background: var(--primary);
            position: absolute; bottom: 0; left: 0;
            transition: width 0.5s;
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>
    <div class="orb"></div>

    <div class="app-shell" id="shell">
        <div class="top-bar">
            <div style="font-weight: 800; letter-spacing: -1px; font-size: 14px;">VIRALFORGE // REQUISITION_MODE</div>
            <div class="status-pill">SYSTEM_ACTIVE</div>
        </div>

        <div class="content">
            <h1>Forge the <br><span style="-webkit-text-fill-color: initial; color: #fff;">Future.</span></h1>
            <p class="subtitle">The world's most advanced engine for algorithmic dominance. Command the feed with one click.</p>

            <div class="control-panel">
                <div class="input-group full-width">
                    <span class="field-label">Target Market / Niche</span>
                    <input type="text" id="nicheInput" placeholder="Enter high-value niche...">
                </div>
                <div class="input-group">
                    <span class="field-label">Psychological Tone</span>
                    <select id="tone">
                        <option>Authoritative</option>
                        <option>Curiosity Gap</option>
                        <option>Controversial</option>
                    </select>
                </div>
                <div class="input-group">
                    <span class="field-label">Delivery Channel</span>
                    <select id="platform">
                        <option>TikTok (Global)</option>
                        <option>Reels (Luxury)</option>
                        <option>Shorts (Retention)</option>
                    </select>
                </div>
            </div>

            <button class="forge-trigger" id="forgeBtn" onclick="runSynthesis()">
                Generate Viral Brief
                <div class="loading-bar" id="loadBar"></div>
            </button>

            <div id="results"></div>
        </div>
    </div>

    <script>
        // 3D Perspective Mouse Effect
        const shell = document.getElementById('shell');
        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 50;
            let y = (window.innerHeight / 2 - e.pageY) / 50;
            shell.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        async function runSynthesis() {
            const niche = document.getElementById('nicheInput').value;
            if(!niche) return;

            const btn = document.getElementById('forgeBtn');
            const bar = document.getElementById('loadBar');
            const results = document.getElementById('results');

            btn.innerText = "SYNTHESIZING...";
            bar.style.width = "100%";
            results.innerHTML = "";

            try {
                const res = await fetch(`/generate?niche=${encodeURIComponent(niche)}`);
                const data = await res.json();
                
                setTimeout(() => {
                    btn.innerText = "GENERATE VIRAL BRIEF";
                    bar.style.width = "0%";
                    
                    if(data.status === "success") {
                        const hook = Array.isArray(data.hooks) ? data.hooks[0] : data.hook;
                        results.innerHTML = `
                            <div class="result-card">
                                <button class="copy-btn" onclick="navigator.clipboard.writeText('${hook}')">COPY BRIEF</button>
                                <span style="color:var(--primary); font-size:10px; font-weight:800;">ALGORITHMIC OUTPUT</span>
                                <div style="font-size:1.5rem; font-weight:700; margin-top:15px; line-height:1.2;">"${hook}"</div>
                                <div style="margin-top:20px; color:#475569; font-size:13px; line-height:1.6;">
                                    <strong>DISTRIBUTION STRATEGY:</strong> High-retention opening, 0.5s visual hook, 120bpm pacing recommended.
                                </div>
                            </div>
                        `;
                    }
                }, 1200);
            } catch (e) {
                btn.innerText = "LINK FAILURE";
            }
        }
    </script>
</body>
</html>
