<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forge Omni | Elite Content Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffa6;
            --accent: #d946ef;
            --bg: #010409;
            --glass: rgba(13, 17, 23, 0.96);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 10px;
        }

        #neuralCanvas { position: fixed; inset: 0; z-index: 1; opacity: 0.4; pointer-events: none; }

        .app-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1000px;
            margin-top: 4vh;
            padding-bottom: 80px;
        }

        /* --- HEADER --- */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--primary);
            background: rgba(0, 255, 166, 0.05);
            padding: 8px 16px;
            border-radius: 100px;
            border: 1px solid rgba(0, 255, 166, 0.2);
            margin-bottom: 2rem;
        }

        .dot { height: 6px; width: 6px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        h1 { font-size: clamp(3rem, 8vw, 5rem); font-weight: 800; letter-spacing: -4px; line-height: 0.85; margin-bottom: 1rem; }
        h1 span { color: var(--primary); }

        .hero-sub { color: #8b949e; font-size: 1.1rem; margin-bottom: 3rem; max-width: 600px; line-height: 1.6; }

        /* --- MULTI-CHANNEL CONTROL --- */
        .control-panel {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 30px;
            backdrop-filter: blur(30px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 1.5rem;
        }

        @media (min-width: 768px) { .grid-inputs { grid-template-columns: 2fr 1fr 1fr; } }

        .input-wrap {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 14px 20px;
            transition: 0.3s;
        }

        .input-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 25px rgba(0, 255, 166, 0.1); }

        label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #484f58; margin-bottom: 5px; text-transform: uppercase; }

        input, select { 
            width: 100%; background: transparent; border: none; color: #fff; 
            font-size: 1.05rem; outline: none; font-weight: 600; 
        }

        .fire-btn {
            width: 100%;
            padding: 24px;
            border-radius: 20px;
            border: none;
            background: #fff;
            color: #000;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .fire-btn:hover { background: var(--primary); transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0, 255, 166, 0.3); }

        /* --- OMNI RESULTS GRID --- */
        #omniResults { 
            margin-top: 3rem; 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 20px; 
        }

        @media (min-width: 768px) { #omniResults { grid-template-columns: 1fr 1fr; } }

        .strategy-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: reveal 0.6s ease-out forwards;
        }

        @keyframes reveal { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .platform-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            background: rgba(217, 70, 239, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 100px;
            width: fit-content;
            font-weight: 700;
        }

        .hook-title { font-size: 1.4rem; font-weight: 800; line-height: 1.2; color: #fff; }

        .action-logic {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            color: #8b949e;
            line-height: 1.6;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .action-logic strong { color: var(--primary); }

    </style>
</head>
<body>

<canvas id="neuralCanvas"></canvas>

<div class="app-wrapper">
    <div class="status-badge">
        <div class="dot"></div> 2026 GLOBAL OMNI-ENGINE ACTIVE
    </div>

    <h1>Forge<span>Omni.</span></h1>
    <p class="hero-sub">The ultimate multi-channel intelligence suite. Convert high-value concepts into authority across the entire social ecosystem.</p>

    <div class="control-panel">
        <div class="grid-inputs">
            <div class="input-wrap">
                <label>Industry / Niche</label>
                <input type="text" id="mainNiche" placeholder="e.g. BioTech, Real Estate">
            </div>
            <div class="input-wrap">
                <label>Primary Intent</label>
                <select id="intent">
                    <option>Authority Build</option>
                    <option>Logic Defiance</option>
                    <option>Viral Growth</option>
                    <option>Community Trust</option>
                </select>
            </div>
            <div class="input-wrap">
                <label>Channel Scope</label>
                <select id="scope">
                    <option>All Socials</option>
                    <option>Short-form Only</option>
                    <option>Professional Only</option>
                </select>
            </div>
        </div>

        <button class="fire-btn" onclick="executeOmniForge()">Execute Omni-Forge</button>
    </div>

    <div id="omniResults"></div>
</div>

<script>
    // --- NEURAL PHYSICS ---
    const canvas = document.getElementById('neuralCanvas');
    const ctx = canvas.getContext('2d');
    let nodes = [];

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        nodes = [];
        for(let i=0; i<80; i++) {
            nodes.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3
            });
        }
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        nodes.forEach((n, i) => {
            n.x += n.vx; n.y += n.vy;
            if(n.x < 0 || n.x > canvas.width) n.vx *= -1;
            if(n.y < 0 || n.y > canvas.height) n.vy *= -1;

            nodes.slice(i+1).forEach(n2 => {
                let d = Math.hypot(n.x - n2.x, n.y - n2.y);
                if(d < 160) {
                    ctx.strokeStyle = `rgba(0, 255, 166, ${1 - d/160})`;
                    ctx.lineWidth = 0.4;
                    ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(n2.x, n2.y); ctx.stroke();
                }
            });
        });
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', init);
    init(); draw();

    // --- OMNI ENGINE LOGIC ---
    function executeOmniForge() {
        const niche = document.getElementById('mainNiche').value || "Industry";
        const res = document.getElementById('omniResults');
        res.innerHTML = `<div style="grid-column: 1/-1; text-align:center; font-family:'JetBrains Mono'; color:var(--primary); padding:40px;">SYNCHRONIZING GLOBAL CHANNELS...</div>`;

        setTimeout(() => {
            res.innerHTML = "";
            const platforms = [
                { p: "LINKEDIN EXECUTIVE", h: `The quiet ${niche} shift that will redefine the next decade.`, l: "Focuses on <strong>Future-Proofing</strong>. High-level professionals engage with long-term security and industry shifts." },
                { p: "X VIRAL THREAD", h: `Everything you were taught about ${niche} is a lie. 🧵`, l: "Uses <strong>Counter-Intuitive Truths</strong>. Threads that challenge consensus are the most shared format on X." },
                { p: "TIKTOK RETENTION", h: `Stop scrolling if you care about your ${niche} growth.`, l: "The <strong>Negative Constraint</strong> hook. It forces a micro-second of self-reflection to halt the scroll." },
                { p: "PINTEREST VISUAL", h: `10 Aesthetic ${niche} Frameworks for 2026.`, l: "Leverages <strong>Visual Aspiration</strong>. Users on Pinterest save 'Blueprints' and 'Cheat Sheets'." },
                { p: "NEWSLETTER (DEEP VALUE)", h: `The raw math behind a $1M ${niche} operation.`, l: "Focuses on <strong>Radical Transparency</strong>. Email subscribers value the 'behind-the-scenes' data they can't get elsewhere." },
                { p: "IG REELS (LUXURY)", h: `Mastering the art of ${niche} without the noise.`, l: "Uses <strong>Minimalist Authority</strong>. High-end brands win by doing less, better." }
            ];

            platforms.forEach((item, index) => {
                setTimeout(() => {
                    const card = document.createElement('div');
                    card.className = "strategy-item";
                    card.innerHTML = `
                        <span class="platform-tag">${item.p}</span>
                        <div class="hook-title">${item.h}</div>
                        <div class="action-logic"><strong>Strategic Logic:</strong> ${item.l}</div>
                    `;
                    res.appendChild(card);
                    if(index === platforms.length - 1) {
                         window.scrollTo({ top: res.offsetTop - 50, behavior: 'smooth' });
                    }
                }, index * 100);
            });
        }, 1200);
    }
</script>

</body>
</html>
