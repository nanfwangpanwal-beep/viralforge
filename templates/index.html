<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralForge | Premium OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #35F0BA;
            --cyan: #00E5FF;
            --violet: #A75FFF;
            --bg: #020406;
            --glass: rgba(10, 14, 20, 0.88);
            --border: rgba(255, 255, 255, 0.08);
            --neon-glow: 0 0 25px rgba(53, 240, 186, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; padding-bottom: 50px; }

        .ambient-neural { position: fixed; inset: 0; background: radial-gradient(circle at 20% 30%, #0d121f 0%, #000 100%); z-index: -1; }

        header { 
            position: sticky; top: 0; z-index: 1000; background: rgba(2, 4, 6, 0.9); 
            backdrop-filter: blur(25px); border-bottom: 1px solid var(--border);
            padding: 18px 30px; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: 'Exo', sans-serif; font-size: 1.6rem; font-weight: 800; text-shadow: 0 0 15px rgba(53, 240, 186, 0.4); letter-spacing: -1px; }
        .logo span { background: linear-gradient(135deg, var(--mint), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }

        .card { 
            background: var(--glass); 
            border: 1px solid var(--border); 
            border-radius: 40px; 
            padding: 35px; 
            backdrop-filter: blur(40px);
            box-shadow: var(--neon-glow);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .card:hover { border-color: rgba(53, 240, 186, 0.5); box-shadow: 0 0 35px rgba(53, 240, 186, 0.25); }

        .span-8 { grid-column: span 8; } .span-4 { grid-column: span 4; } .span-12 { grid-column: span 12; }
        @media (max-width: 900px) { .span-8, .span-4 { grid-column: span 12; } }

        h3 { font-family: 'Exo', sans-serif; font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; color: var(--mint); margin-bottom: 25px; }

        textarea, input, select { 
            width: 100%; background: rgba(255,255,255,0.02); border: 1px solid var(--border); 
            border-radius: 22px; padding: 20px; color: #fff; outline: none; transition: 0.3s;
        }
        textarea:focus { border-color: var(--mint); background: rgba(53, 240, 186, 0.03); }

        .btn-forge { 
            width: 100%; padding: 22px; border-radius: 22px; border: none; 
            background: linear-gradient(135deg, var(--mint), var(--cyan)); 
            color: #000; font-family: 'Exo', sans-serif; font-weight: 800; text-transform: uppercase; cursor: pointer;
        }

        .output-portal { 
            margin-top: 30px; background: rgba(5, 7, 10, 0.8); border: 1px solid var(--border); 
            border-radius: 35px; padding: 35px; border-left: 5px solid var(--mint);
            position: relative; overflow: hidden; display: none;
        }

        .output-ctrl { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .ctrl-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff;
            padding: 8px 15px; border-radius: 12px; font-family: 'JetBrains Mono'; font-size: 9px; font-weight: 700; cursor: pointer;
        }
        .btn-copy { background: var(--mint); color: #000; border: none; }

        /* GLITCH REVEAL ANIMATION */
        .glitch-reveal {
            animation: glitchReveal 0.4s steps(4) forwards;
            opacity: 0;
        }

        @keyframes glitchReveal {
            0% { opacity: 0; transform: skewX(20deg); filter: blur(5px); }
            20% { opacity: 0.5; transform: skewX(-15deg); filter: blur(2px); }
            50% { opacity: 0.8; transform: skewX(10deg); filter: blur(1px); }
            100% { opacity: 1; transform: skewX(0); filter: blur(0); }
        }

        .sync-container { margin-top: 25px; }
        .sync-meta { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 10px; margin-bottom: 8px; }
        .sync-track { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .sync-fill { height: 100%; background: linear-gradient(90deg, var(--mint), var(--cyan)); box-shadow: 0 0 15px var(--mint); transition: width 2s ease; }

        .history-rail { display: flex; gap: 15px; overflow-x: auto; padding: 15px 0; margin-top: 15px; }
        .history-rail::-webkit-scrollbar { display: none; }
        .history-item { 
            flex: 0 0 180px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); 
            padding: 18px; border-radius: 25px;
        }
        .history-item span { color: var(--mint); font-family: 'JetBrains Mono'; font-size: 10px; display: block; margin-bottom: 5px; }
        .history-item p { font-size: 10px; opacity: 0.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

<header>
    <div class="logo">Viral<span>Forge.</span></div>
    <div class="chronos-module" style="text-align: right;">
        <span id="live-clock" style="font-family:'JetBrains Mono'; font-size:12px; font-weight:700;">00:00:00</span>
        <span style="font-family:'JetBrains Mono'; font-size:8px; color:var(--mint); display:block; text-transform:uppercase; letter-spacing:2px;">APRIL 13, 2026</span>
    </div>
</header>

<div class="ambient-neural"></div>

<div class="container">
    <div class="grid">
        <div class="card span-8">
            <h3>Elite Ghostwriter</h3>
            <textarea id="gIn" placeholder="Neural scanning active: Paste dialogue history..." rows="4"></textarea>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:15px;">
                <select id="gArc"><option value="ego">Archetype: Ego-Centric</option><option value="cold">Archetype: Cold Ghoster</option></select>
                <select id="gMove"><option value="push">Strategy: Push-Pull</option><option value="scarcity">Strategy: Scarcity</option></select>
            </div>
            <div class="history-rail" id="gHist"></div>
            <button class="btn-forge" style="margin-top:15px;" onclick="forge('ghost')">Forge Stealth Reply</button>
        </div>

        <div class="card span-4">
            <h3>Identity Forge</h3>
            <textarea id="voiceIn" placeholder="Feed voice samples for calibration..." style="height:160px;"></textarea>
            <div class="sync-container">
                <div class="sync-meta"><span>NEURAL_SYNC</span><span id="syncPerc">0%</span></div>
                <div class="sync-track"><div class="sync-fill" id="syncFill" style="width: 0%;"></div></div>
            </div>
            <button class="btn-forge" style="background:transparent; border:1px solid var(--border); color:#fff; font-size:11px; margin-top:20px;" onclick="syncIdentity()">Sync Identity</button>
        </div>

        <div class="card span-12">
            <h3>Viral Forge Engine</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap:15px;">
                <input type="text" id="vIn" placeholder="Niche (e.g. SaaS, AI, Luxury)">
                <select id="vHook"><option value="gap">Hook: Authority Gap</option><option value="pattern">Hook: Pattern Interrupt</option></select>
                <button class="btn-forge" style="margin:0; padding:0 40px;" onclick="forge('viral')">Forge Hook</button>
            </div>
            <div class="history-rail" id="vHist"></div>

            <div class="output-portal" id="outBox">
                <div class="output-ctrl">
                    <button class="ctrl-btn" onclick="share('x')">X</button>
                    <button class="ctrl-btn" onclick="share('wa')">WA</button>
                    <button class="ctrl-btn" onclick="share('tg')">TG</button>
                    <button class="ctrl-btn btn-copy" onclick="copy()">COPY</button>
                </div>
                <div style="font-family:'JetBrains Mono'; font-size:9px; color:#555;">[PROTOCOL: ACTIVE] [ENGINE: STARK_V5]</div>
                <div class="res-text" id="resText" style="font-size: 1.5rem; font-weight: 600; margin: 30px 0;"></div>
                <div style="font-size:11px; color:#666; border-top:1px solid var(--border); padding-top:20px;" id="resStrategy"></div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', {hour12:false});
    }
    setInterval(updateClock, 1000); updateClock();

    function syncIdentity() {
        document.getElementById('syncFill').style.width = '94%';
        document.getElementById('syncPerc').innerText = '94.2%';
    }

    function forge(type) {
        const box = document.getElementById('outBox');
        const resText = document.getElementById('resText');
        box.style.display = 'block';
        
        // Apply Glitch Reveal
        resText.classList.remove('glitch-reveal');
        void resText.offsetWidth; // Trigger reflow
        resText.classList.add('glitch-reveal');

        const hex = Math.floor(Math.random()*65535).toString(16).toUpperCase().padStart(4, '0');
        
        if(type === 'ghost') {
            const content = "honestly, i was starting to think you were interesting, but now you’re just being predictable.";
            resText.innerText = content;
            document.getElementById('resStrategy').innerText = "Neural Insight: Pattern Interrupt establishing high-status frame.";
            addHist('gHist', content, hex);
        } else {
            const niche = document.getElementById('vIn').value || 'Industry';
            const content = `Why 99% of ${niche} founders fail—and the 2-minute fix they ignore.`;
            resText.innerText = content;
            document.getElementById('resStrategy').innerText = "Neural Insight: Leverages Logic Defiance to command attention.";
            addHist('vHist', content, hex);
        }
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function addHist(id, txt, hex) {
        const rail = document.getElementById(id);
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `<span>ID_${hex}</span><p>${txt}</p>`;
        rail.prepend(item);
    }

    function copy() {
        navigator.clipboard.writeText(document.getElementById('resText').innerText);
        alert("Synced to clipboard.");
    }

    function share(platform) {
        const text = encodeURIComponent(document.getElementById('resText').innerText);
        const urls = {
            x: `https://twitter.com/intent/tweet?text=${text}`,
            wa: `https://wa.me/?text=${text}`,
            tg: `https://t.me/share/url?url=${text}`
        };
        window.open(urls[platform], '_blank');
    }
</script>

</body>
</html>
