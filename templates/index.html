<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ViralForge OS | Final Boss AI SaaS</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--a:#00ffa6;
--b:#00d4ff;
--c:#7c3aed;
--bg:#05060a;
--glass:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.12);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
cursor:none;
}

body{
height:100vh;
overflow:hidden;
background:var(--bg);
color:white;
}

/* ===== PARTICLES ===== */
canvas{
position:fixed;
inset:0;
z-index:0;
}

/* ===== AURORA ===== */
body::before{
content:"";
position:fixed;
inset:-200px;
background:
radial-gradient(circle at 20% 30%, rgba(0,255,166,0.2), transparent 40%),
radial-gradient(circle at 80% 20%, rgba(0,212,255,0.2), transparent 45%),
radial-gradient(circle at 40% 80%, rgba(124,58,237,0.2), transparent 50%);
filter:blur(80px);
animation:float 12s ease-in-out infinite alternate;
}

@keyframes float{
from{transform:translateY(-20px)}
to{transform:translateY(20px)}
}

/* ===== CURSOR ===== */
.cursor{
position:fixed;
width:10px;height:10px;
background:white;
border-radius:50%;
mix-blend-mode:difference;
z-index:9999;
}

/* ===== AUTH MODAL ===== */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(30px);
border:1px solid var(--border);
padding:30px;
border-radius:24px;
width:320px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid var(--border);
background:rgba(0,0,0,0.4);
color:white;
}

button{
width:100%;
margin-top:12px;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,var(--a),var(--b),var(--c));
font-weight:800;
}

/* ===== APP ===== */
.app{
display:none;
grid-template-columns:260px 1fr 300px;
height:100vh;
position:relative;
z-index:2;
}

/* SIDEBAR */
.sidebar{
padding:20px;
background:rgba(255,255,255,0.03);
border-right:1px solid var(--border);
}

.logo{
font-size:20px;
font-weight:800;
margin-bottom:20px;
}

.nav div{
padding:10px;
border-radius:10px;
margin-bottom:8px;
background:rgba(255,255,255,0.04);
}

/* MAIN */
.main{
padding:20px;
display:flex;
flex-direction:column;
}

.hero{
font-size:28px;
font-weight:800;
margin-bottom:10px;
}

.chat{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
margin:10px 0;
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.05);
animation:fade .3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* INPUT BAR */
.bar{
display:flex;
gap:10px;
}

.bar input{
flex:1;
}

/* ANALYTICS */
.right{
padding:20px;
border-left:1px solid var(--border);
}

.metric{
background:rgba(255,255,255,0.05);
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

canvas#chart{
width:100%;
height:120px;
background:rgba(255,255,255,0.03);
border-radius:12px;
margin-top:10px;
}

/* COMMAND PALETTE */
.kbd{
position:fixed;
bottom:20px;
left:20px;
font-size:12px;
opacity:0.6;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<div class="cursor" id="cursor"></div>

<!-- AUTH -->
<div class="modal" id="auth">
<div class="card">
<h2>ViralForge OS</h2>
<p style="opacity:0.6;font-size:12px;">Enter demo access</p>
<input placeholder="Email"/>
<input placeholder="Password"/>
<button onclick="enter()">Enter System</button>
</div>
</div>

<!-- APP -->
<div class="app" id="app">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">ViralForge OS</div>
<div class="nav">
<div>Dashboard</div>
<div>AI Engine</div>
<div>Analytics</div>
<div>Exports</div>
</div>
</div>

<!-- MAIN -->
<div class="main">
<div class="hero">AI Viral Intelligence System</div>

<div class="chat" id="chat"></div>

<div class="bar">
<input id="input" placeholder="Ask AI: generate viral hooks..."/>
<button onclick="send()">Send</button>
</div>
</div>

<!-- RIGHT -->
<div class="right">
<div class="metric">System Uptime: 99.99%</div>
<div class="metric">Latency: 0.9s</div>
<div class="metric">Active Models: 3</div>

<canvas id="chart"></canvas>
</div>

</div>

<div class="kbd">Press CTRL + K for command palette (demo)</div>

<script>

/* ===== ENTER SYSTEM ===== */
function enter(){
document.getElementById("auth").style.display="none";
document.getElementById("app").style.display="grid";
}

/* ===== CURSOR ===== */
document.addEventListener("mousemove",(e)=>{
document.getElementById("cursor").style.left=e.clientX+"px";
document.getElementById("cursor").style.top=e.clientY+"px";
});

/* ===== CHAT STREAM AI ===== */
function send(){
const input=document.getElementById("input");
const chat=document.getElementById("chat");

if(!input.value)return;

chat.innerHTML+=`<div class="msg"><b>You:</b> ${input.value}</div>`;

let reply=document.createElement("div");
reply.className="msg";
reply.innerHTML="<b>AI:</b> Thinking...";
chat.appendChild(reply);

let steps=[
"Analyzing viral patterns...",
"Mapping audience psychology...",
"Generating hooks...",
"Ranking engagement probability..."
];

let i=0;
let interval=setInterval(()=>{
reply.innerHTML="<b>AI:</b> "+steps[i];
i++;
if(i>=steps.length){
clearInterval(interval);

setTimeout(()=>{
reply.innerHTML="<b>AI:</b> The $10K mistake in your niche is hidden distribution, not content quality.";
},400);
}
},600);

input.value="";
}

/* ===== PARTICLES ===== */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let p=[];

for(let i=0;i<60;i++){
p.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.5,
vy:(Math.random()-0.5)*0.5
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<p.length;i++){
let a=p[i];
a.x+=a.vx;
a.y+=a.vy;

if(a.x<0||a.x>canvas.width)a.vx*=-1;
if(a.y<0||a.y>canvas.height)a.vy*=-1;

ctx.fillStyle="rgba(255,255,255,0.5)";
ctx.fillRect(a.x,a.y,2,2);
}

requestAnimationFrame(draw);
}
draw();

/* ===== LIVE CHART ===== */
const c=document.getElementById("chart");
const x=c.getContext("2d");

let data=[10,20,15,30,25,40,35];

function chart(){
x.clearRect(0,0,c.width,c.height);
x.beginPath();

for(let i=0;i<data.length;i++){
let px=i*40;
let py=100-data[i];

x.lineTo(px,py);
}

x.strokeStyle="rgba(0,255,166,0.8)";
x.stroke();

data.shift();
data.push(Math.random()*50);

requestAnimationFrame(chart);
}
chart();

</script>

</body>
</html>
