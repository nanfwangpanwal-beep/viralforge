<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralForge AI</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; }
        h1 { color: #00ff88; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 12px; margin: 1rem 0; border-radius: 8px; border: none; background: #2a2a2a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #00ff88; color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00cc6e; }
        #result { margin-top: 1.5rem; line-height: 1.5; color: #ccc; font-style: italic; }
    </style>
</head>
<body>
    <div class="card">
        <h1>ViralForge</h1>
        <p>Enter your niche to generate a hook</p>
        <input type="text" id="nicheInput" placeholder="e.g. Fitness, Crypto, Cooking">
        <button onclick="generateHook()">Generate Viral Hook</button>
        <div id="result"></div>
    </div>

    <script>
        async function generateHook() {
            const niche = document.getElementById('nicheInput').value;
            const resDiv = document.getElementById('result');
            resDiv.innerText = "Generating magic...";
            
            try {
                const response = await fetch(`/generate?niche=${niche}`);
                const data = await response.json();
                if (data.status === "success") {
                    resDiv.innerText = `"${data.hook}"`;
                } else {
                    resDiv.innerText = "Error: " + data.message;
                }
            } catch (err) {
                resDiv.innerText = "Could not connect to the engine.";
            }
        }
    </script>
</body>
</html>
