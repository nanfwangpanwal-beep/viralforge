<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ViralForge X | INSANE MODE</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --a:#00ffa6;
    --b:#00d4ff;
    --c:#7c3aed;
    --d:#ff2bd6;
    --bg:#05060a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Plus Jakarta Sans',sans-serif;
    cursor:none;
}

body{
    height:100vh;
    overflow:hidden;
    background:var(--bg);
    color:white;
}

/* ===== PARTICLE CANVAS ===== */
canvas{
    position:fixed;
    inset:0;
    z-index:0;
}

/* ===== AURORA DEPTH ===== */
body::before{
    content:"";
    position:fixed;
    inset:-200px;
    background:
    radial-gradient(circle at 20% 30%, rgba(0,255,166,0.18), transparent 40%),
    radial-gradient(circle at 80% 20%, rgba(0,212,255,0.18), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(124,58,237,0.18), transparent 50%);
    filter: blur(70px);
    animation:float 10s ease-in-out infinite alternate;
    z-index:1;
}

@keyframes float{
    from{transform:translateY(-20px) scale(1);}
    to{transform:translateY(20px) scale(1.1);}
}

/* ===== NOISE ===== */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:url("https://grainy-gradients.vercel.app/noise.svg");
    opacity:0.05;
    z-index:2;
    pointer-events:none;
}

/* ===== CURSOR ===== */
.cursor{
    position:fixed;
    width:12px;height:12px;
    background:white;
    border-radius:50%;
    mix-blend-mode:difference;
    z-index:9999;
}

.glow{
    position:fixed;
    width:420px;height:420px;
    background:radial-gradient(circle, rgba(0,255,166,0.18), transparent 60%);
    transform:translate(-50%,-50%);
    z-index:3;
}

/* ===== LOADER ===== */
#loader{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10000;
}

.loaderBox{
    width:320px;
    height:2px;
    background:rgba(255,255,255,0.1);
    overflow:hidden;
    border-radius:100px;
}

.loaderBar{
    height:100%;
    width:100%;
    background:linear-gradient(90deg,var(--a),var(--b),var(--c),var(--d));
    transform:translateX(-100%);
    animation:load 2s cubic-bezier(.77,0,.18,1) forwards;
}

@keyframes load{ to{ transform:translateX(0);} }

/* ===== MAIN UI ===== */
.container{
    position:relative;
    z-index:10;
    max-width:920px;
    margin:auto;
    top:50%;
    transform:translateY(-50%);
    padding:44px;

    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:36px;
    backdrop-filter: blur(35px);

    box-shadow:
    0 40px 120px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,255,255,0.06);
}

/* ===== STATUS ===== */
.status{
    display:flex;
    justify-content:space-between;
    font-size:11px;
    letter-spacing:2px;
    color:#9ca3af;
    margin-bottom:26px;
}

.dot{
    width:6px;height:6px;
    background:var(--a);
    border-radius:50%;
    display:inline-block;
    box-shadow:0 0 14px var(--a);
}

/* ===== TITLE ===== */
h1{
    font-size:60px;
    font-weight:800;
    letter-spacing:-2px;
}

h1 span{
    background:linear-gradient(90deg,var(--a),var(--b),var(--c),var(--d));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p{
    color:#9ca3af;
    margin-top:8px;
    margin-bottom:30px;
}

/* ===== GRID ===== */
.grid{
    display:grid;
    grid-template-columns:2fr 1fr 1fr;
    gap:12px;
}

input,select{
    background:rgba(0,0,0,0.35);
    border:1px solid rgba(255,255,255,0.1);
    padding:16px;
    border-radius:16px;
    color:white;
    transition:0.3s;
    outline:none;
}

input:focus,select:focus{
    border-color:var(--a);
    box-shadow:0 0 0 3px rgba(0,255,166,0.1);
}

/* ===== BUTTON (MAGNETIC FEEL) ===== */
button{
    margin-top:14px;
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    font-weight:800;
    background:linear-gradient(90deg,var(--a),var(--b),var(--c),var(--d));
    color:black;
    transition:0.25s ease;
}

button:hover{
    transform:scale(1.03);
    filter:brightness(1.2);
}

/* ===== RESULTS ===== */
.results{
    margin-top:28px;
    display:flex;
    flex-direction:column;
    gap:12px;
    max-height:240px;
    overflow:auto;
}

.card{
    padding:18px;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    animation:pop 0.5s ease;
}

@keyframes pop{
    from{opacity:0;transform:translateY(10px) scale(0.98);}
    to{opacity:1;transform:translateY(0) scale(1);}
}

.meta{
    font-size:10px;
    color:var(--a);
    letter-spacing:2px;
    margin-bottom:6px;
}

/* ===== FLOATING ACTIVITY ===== */
.activity{
    position:fixed;
    bottom:25px;
    right:25px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:20;
}

.pulse{
    background:rgba(255,255,255,0.05);
    padding:10px 14px;
    border-radius:999px;
    font-size:11px;
    animation:fade 4s forwards;
}

@keyframes fade{
    0%{opacity:0;transform:translateY(10px);}
    10%,90%{opacity:1;}
    100%{opacity:0;}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div id="loader">
    <div class="loaderBox"><div class="loaderBar"></div></div>
</div>

<div class="cursor" id="cursor"></div>
<div class="glow" id="glow"></div>

<div class="container" id="ui">

    <div class="status">
        <div><span class="dot"></span> CORE SYSTEM ONLINE</div>
        <div>VIRALFORGE X</div>
    </div>

    <h1>Viral<span>Forge</span></h1>
    <p>Next-gen intelligence engine for elite viral creators.</p>

    <div class="grid">
        <input id="niche" placeholder="Enter niche (e.g fintech)">
        <select><option>Hype</option><option>Story</option></select>
        <select><option>TikTok</option><option>YouTube</option></select>
    </div>

    <button id="btn">ACTIVATE FORGE ENGINE</button>

    <div class="results" id="results"></div>
</div>

<div class="activity" id="activity"></div>

<script>
/* ===== CURSOR ===== */
const cursor=document.getElementById("cursor");
const glow=document.getElementById("glow");
const ui=document.getElementById("ui");

document.addEventListener("mousemove",(e)=>{
    cursor.style.left=e.clientX+"px";
    cursor.style.top=e.clientY+"px";

    glow.style.left=e.clientX+"px";
    glow.style.top=e.clientY+"px";

    let x=(window.innerWidth/2-e.clientX)/80;
    let y=(window.innerHeight/2-e.clientY)/80;

    ui.style.transform=`translateY(-50%) rotateY(${-x}deg) rotateX(${y}deg)`;
});

/* ===== LOADER ===== */
setTimeout(()=>document.getElementById("loader").remove(),2200);

/* ===== ENGINE ===== */
document.getElementById("btn").onclick=function(){
    const n=document.getElementById("niche").value;
    if(!n) return;

    this.innerText="FORGING...";
    this.disabled=true;

    setTimeout(()=>{
        this.innerText="ACTIVATE FORGE ENGINE";
        this.disabled=false;

        const hooks=[
            `The $10K ${n} blind spot nobody sees.`,
            `Why 99% of ${n} creators stay stuck forever.`,
            `The forbidden ${n} growth loop elites use.`
        ];

        const res=document.getElementById("results");
        res.innerHTML="";

        hooks.forEach((h,i)=>{
            setTimeout(()=>{
                const div=document.createElement("div");
                div.className="card";
                div.innerHTML=`
                    <div class="meta">STRATEGY NODE 0${i+1}</div>
                    <div>${h}</div>
                `;
                res.appendChild(div);
            },i*140);
        });

    },900);
};

/* ===== ACTIVITY ===== */
const names=["Julian","Sasha","Marcus","Elena","Amir","Nova"];
setInterval(()=>{
    const d=document.createElement("div");
    d.className="pulse";
    d.innerHTML=`<b>${names[Math.floor(Math.random()*names.length)]}</b> created a viral node`;
    document.getElementById("activity").prepend(d);
    if(document.getElementById("activity").children.length>3){
        document.getElementById("activity").lastChild.remove();
    }
},3500);

/* ===== PARTICLES ENGINE ===== */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        vx:(Math.random()-0.5)*0.6,
        vy:(Math.random()-0.5)*0.6
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let p of particles){
        p.x+=p.vx;
        p.y+=p.vy;

        if(p.x<0||p.x>canvas.width) p.vx*=-1;
        if(p.y<0||p.y>canvas.height) p.vy*=-1;

        ctx.fillStyle="rgba(255,255,255,0.4)";
        ctx.beginPath();
        ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
        ctx.fill();

        for(let q of particles){
            let dx=p.x-q.x;
            let dy=p.y-q.y;
            let dist=Math.sqrt(dx*dx+dy*dy);

            if(dist<120){
                ctx.strokeStyle="rgba(0,255,166,0.08)";
                ctx.beginPath();
                ctx.moveTo(p.x,p.y);
                ctx.lineTo(q.x,q.y);
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
