<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralForge AI | Luxury Creator Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #00ffa6;
    --secondary: #00c3ff;
    --accent: #ffd700; /* champagne gold */
    --bg-dark: #030712;
    --card-bg: rgba(20, 25, 40, 0.65);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

body {
    background: linear-gradient(135deg, #030712, #0a0f1f);
    background-image: 
        radial-gradient(circle at 15% 25%, rgba(0, 255, 166, 0.08) 0%, transparent 25%),
        radial-gradient(circle at 85% 75%, rgba(0, 195, 255, 0.08) 0%, transparent 25%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 50px 20px;
}

.container {
    width: 100%;
    max-width: 720px;
    padding: 4rem;
    border-radius: 40px;
    background: var(--card-bg);
    backdrop-filter: blur(50px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 60px 120px -30px rgba(0, 0, 0, 0.7);
    transition: all 0.5s ease;
    animation: fadeIn 1.2s ease forwards;
}

h1 {
    font-size: 3.8rem;
    font-weight: 800;
    margin-bottom: 20px;
    background: linear-gradient(to right, var(--primary), var(--secondary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -2px;
}

.tagline {
    color: #a1a1aa;
    font-size: 1.2rem;
    margin-bottom: 45px;
    font-weight: 300;
    line-height: 1.7;
}

/* Input Styling */
.form-group {
    margin-bottom: 30px;
    text-align: left;
}

label {
    display: block;
    font-size: 0.85rem;
    text-transform: uppercase;
    color: #9ca3af;
    margin-bottom: 12px;
    letter-spacing: 1.8px;
    font-weight: 600;
}

.input-wrapper {
    position: relative;
    width: 100%;
}

input {
    width: 100%;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.12);
    padding: 22px;
    border-radius: 20px;
    color: #fff;
    font-size: 1rem;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: var(--accent);
    background: rgba(255, 255, 255, 0.07);
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
}

.char-count {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: #6b7280;
    font-size: 0.8rem;
}

.dropdown-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 35px;
}

select {
    width: 100%;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.12);
    padding: 18px;
    border-radius: 16px;
    color: #fff;
    appearance: none;
    cursor: pointer;
    outline: none;
    transition: 0.3s;
}

select:hover {
    border-color: var(--secondary);
}

/* Button */
#generateBtn {
    width: 100%;
    padding: 24px;
    border-radius: 22px;
    border: none;
    background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
    color: #020617;
    font-size: 1.2rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    cursor: pointer;
    box-shadow: 0 20px 40px rgba(0, 255, 166, 0.25);
    transition: 0.4s;
}

#generateBtn:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 25px 50px rgba(0, 255, 166, 0.4);
}

#generateBtn:active { transform: translateY(0); }

/* Results Section */
#results {
    margin-top: 50px;
    text-align: left;
}

.card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 35px;
    border-radius: 26px;
    margin-bottom: 25px;
    animation: fadeIn 0.8s ease forwards;
    box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05);
}

.card-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 18px;
}

.copy-badge {
    background: rgba(0, 255, 166, 0.12);
    color: var(--primary);
    padding: 8px 16px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid rgba(0, 255, 166, 0.25);
    transition: 0.3s;
}

.copy-badge:hover {
    background: rgba(0, 255, 166, 0.2);
}

.loading-text {
    margin-top: 25px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 1.2px;
    display: none;
    animation: pulse 1.5s infinite;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
}
</style>
</head>
<body>

<div class="container">
    <h1>ViralForge</h1>
    <p class="tagline">The luxury AI suite for creators who demand virality. Transform ideas into cinematic, scroll-stopping briefs.</p>

    <div class="form-group">
        <label>Your Niche</label>
        <div class="input-wrapper">
            <input type="text" id="nicheInput" maxlength="50" placeholder="e.g. Real Estate, Crypto, High Fashion">
            <span class="char-count" id="counter">0/50</span>
        </div>
    </div>

    <div class="dropdown-grid">
        <div class="form-group" style="margin:0;">
            <label>Content Tone</label>
            <select id="toneSelect">
                <option value="Authority">⚡ Authoritative</option>
                <option value="Hype">🔥 Viral Hype</option>
                <option value="Storytelling">📖 Storytelling</option>
            </select>
        </div>
        <div class="form-group" style="margin:0;">
            <label>Target Platform</label>
            <select id="platformSelect">
                <option value="TikTok">TikTok</option>
                <option value="Instagram
