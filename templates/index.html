<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeLegacy | Ultra-Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(90deg, #35F0BA 0%, #A75FFF 100%);
            --accent: #35F0BA;
            --light-text: #FFFFFF;
            --dark-text: #0F1219;
            --background: #000000;
            --card-bg: rgba(15, 18, 25, 0.8);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--background); color: var(--light-text); overflow-x: hidden; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* --- HEADER --- */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
        .logo { font-family: 'Exo', sans-serif; font-size: 2.2rem; font-weight: 800; }
        .logo span { background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .engine-status { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); letter-spacing: 1px; }

        /* --- DASHBOARD GRID --- */
        .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }
        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 30px; 
            backdrop-filter: blur(20px);
            transition: 0.4s cubic-bezier(0.2, 1, 0.2, 1);
        }
        .card:hover { border-color: rgba(53, 240, 186, 0.3); transform: translateY(-4px); box-shadow: 0 0 30px rgba(53, 240, 186, 0.1); }

        .span-8 { grid-column: span 8; }
        .span-4 { grid-column: span 4; }
        .span-12 { grid-column: span 12; }

        @media (max-width: 900px) { .span-8, .span-4 { grid-column: span 12; } }

        /* --- FORM ELEMENTS --- */
        h3 { font-family: 'Exo', sans-serif; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: #555; margin-bottom: 25px; }
        label { display: block; font-family: 'Inter'; font-weight: 600; font-size: 11px; text-transform: uppercase; color: #888; margin-bottom: 10px; }
        
        textarea, select, input {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px; color: #fff; font-size: 1rem; outline: none; transition: 0.3s;
        }
        textarea:focus { border-color: var(--accent); }

        /* --- PROFESSIONAL BUTTONS --- */
        .btn-primary {
            width: 100%; padding: 20px; border-radius: 15px; border: none;
            background: var(--primary-gradient); color: var(--dark-text);
            font-family: 'Exo', sans-serif; font-weight: 800; font-size: 1rem;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(53, 240, 186, 0.2);
        }
        .btn-primary:hover { filter: brightness(1.1); box-shadow: 0 0 25px rgba(167, 95, 255, 0.3); }

        /* --- THE MODAL (ALERT REPLACEMENT) --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .modal-card {
            background: #0f1219; border: 1px solid var(--accent); border-radius: 20px;
            padding: 40px; max-width: 500px; width: 90%; text-align: center;
        }
        .modal-card h2 { font-family: 'Exo', sans-serif; margin-bottom: 15px; }
        .modal-card p { font-size: 1.2rem; line-height: 1.6; margin-bottom: 25px; color: var(--accent); }

    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div class="logo">Forge<span>Legacy.</span></div>
        <div class="engine-status">2026 ENGINE ONLINE // VERIFIED</div>
    </header>

    <div class="bento-grid">
        <div class="card span-8">
            <h3>◈ Ghostwriter Logic</h3>
            <label>Chat Context</label>
            <textarea id="chatInput" style="height: 120px;" placeholder="Paste the last few messages..."></textarea>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                <div>
                    <label>Tactical Frame</label>
                    <select id="tactic">
                        <option>Push-Pull Tension</option>
                        <option>Expert Authority</option>
                        <option>Pattern Disruption</option>
                    </select>
                </div>
                <div>
                    <label>Identity Goal</label>
                    <select>
                        <option>Increase Perceived Value</option>
                        <option>Secure Meeting</option>
                        <option>Defuse Conflict</option>
                    </select>
                </div>
            </div>
            <button class="btn-primary" style="margin-top: 25px;" onclick="showForgeResult('Social Move Forged: Use calculated disinterest to flip the power dynamic.')">Activate Forge Engine</button>
        </div>

        <div class="card span-4">
            <h3>◈ Identity Sync</h3>
            <label>Voice Samples</label>
            <textarea id="voice" style="height: 255px;" placeholder="I speak in lowercase, I hate emojis, and I use dry wit."></textarea>
            <button class="btn-primary" style="margin-top: 20px; background: transparent; border: 1px solid var(--border); color: #fff;" onclick="showForgeResult('Digital Twin Synchronized: Latent voice parameters mapped.')">Sync Identity</button>
        </div>

        <div class="card span-12">
            <h3>◈ Viral Strategy Forge</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; align-items: flex-end;">
                <div>
                    <label>Industry Niche</label>
                    <input type="text" id="niche" placeholder="Finance, Luxury, SaaS...">
                </div>
                <div>
                    <label>Psychological Trigger</label>
                    <select id="trigger">
                        <option>The Authority Gap</option>
                        <option>Logic Defiance</option>
                        <option>Negative Constraint</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="generateViralHook()">Forge Strategy</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal-card">
        <h2 id="modalTitle">ENGINE OUTPUT</h2>
        <p id="modalContent"></p>
        <button class="btn-primary" style="width: auto; padding: 12px 40px;" onclick="closeModal()">Confirm</button>
    </div>
</div>

<script>
    function showForgeResult(content) {
        document.getElementById('modalTitle').innerText = "SYSTEM NOTIFICATION";
        document.getElementById('modalContent').innerText = content;
        document.getElementById('modal').style.display = 'flex';
    }

    function generateViralHook() {
        const niche = document.getElementById('niche').value || "Industry";
        const content = `VIRALFORGE GENERATED: Why 99% of ${niche} creators fail—and the 3-minute fix they're ignoring.`;
        showForgeResult(content);
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }
</script>

</body>
</html>
