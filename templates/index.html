<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralForge AI</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}

body{
    height:100vh;
    background:#020617;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:#fff;
}

/* ===== CURSOR GLOW ===== */
.cursor-glow{
    position:fixed;
    width:300px;
    height:300px;
    background:radial-gradient(circle,rgba(0,255,166,0.15),transparent 60%);
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:1;
}

/* ===== BG LIGHT ===== */
.bg-glow{
    position:absolute;
    width:800px;height:800px;
    background:radial-gradient(circle,rgba(0,255,166,0.15),transparent 60%);
    filter:blur(120px);
    animation:float 10s infinite ease-in-out;
}
.bg-glow:nth-child(2){
    background:radial-gradient(circle,rgba(0,195,255,0.15),transparent 60%);
    animation-delay:4s;
}
@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-80px);}
}

/* ===== CONTAINER ===== */
.container{
    position:relative;
    z-index:2;
    width:100%;
    max-width:680px;
    padding:3rem;
    border-radius:30px;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(30px);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 40px 120px rgba(0,0,0,0.8);
}

/* ===== TITLE ===== */
h1{
    font-size:3rem;
    font-weight:800;
    background:linear-gradient(90deg,#00ffa6,#00c3ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.tagline{
    margin:10px 0 30px;
    color:#94a3b8;
}

/* ===== INPUT ===== */
.input-wrap{position:relative;margin-bottom:20px;}
input{
    width:100%;
    padding:18px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.03);
    color:#fff;
    outline:none;
}
.counter{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    font-size:0.8rem;
    color:#64748b;
}

/* ===== SELECTS ===== */
.row{display:flex;gap:10px;margin-bottom:20px;}
select{
    flex:1;
    padding:14px;
    border-radius:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    color:white;
}

/* ===== BUTTON ===== */
button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#00ffa6,#00c3ff);
    font-weight:700;
    cursor:pointer;
    position:relative;
    overflow:hidden;
}

/* ripple */
.ripple{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.4);
    transform:scale(0);
    animation:ripple 0.6s linear;
}
@keyframes ripple{
    to{transform:scale(4);opacity:0;}
}

/* ===== LOADING ===== */
.loading{margin-top:10px;color:#00ffa6;display:none;}

/* ===== RESULTS ===== */
#results{margin-top:20px;}
.card{
    background:rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.05);
    padding:20px;
    border-radius:14px;
    margin-bottom:10px;
}
.copy{float:right;cursor:pointer;color:#00ffa6;font-size:0.8rem;}

/* typing text */
.hook-text{font-size:1.1rem;line-height:1.5;}

/* skeleton */
.skeleton{
    height:70px;
    border-radius:12px;
    background:linear-gradient(90deg,#111,#222,#111);
    background-size:200% 100%;
    animation:shimmer 1.2s infinite;
    margin-bottom:10px;
}
@keyframes shimmer{
    0%{background-position:-200% 0;}
    100%{background-position:200% 0;}
}

/* toast */
.toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#00ffa6;
    color:#021617;
    padding:10px 15px;
    border-radius:8px;
    display:none;
}

/* activity feed */
.activity-feed{
    position:fixed;
    bottom:20px;
    left:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}
.activity-item{
    background:rgba(15,23,42,0.85);
    padding:10px 15px;
    border-radius:10px;
    font-size:0.8rem;
    animation:fade 5s forwards;
}
@keyframes fade{
    0%{opacity:0;transform:translateY(10px);}
    10%{opacity:1;}
    90%{opacity:1;}
    100%{opacity:0;}
}
</style>
</head>

<body>

<div class="cursor-glow" id="cursorGlow"></div>
<div class="bg-glow"></div>
<div class="bg-glow"></div>

<div class="container">
    <h1>ViralForge</h1>
    <p class="tagline">AI-powered virality engine for creators.</p>

    <div class="input-wrap">
        <input id="nicheInput" maxlength="50" placeholder="Enter niche">
        <div class="counter" id="counter">0/50</div>
    </div>

    <div class="row">
        <select><option>Authority</option><option>Hype</option></select>
        <select><option>TikTok</option><option>Instagram</option></select>
    </div>

    <button id="btn">FORGE VIRAL</button>

    <div class="loading" id="loading">AI generating...</div>
    <div id="results"></div>
</div>

<div class="toast" id="toast">Copied!</div>
<div class="activity-feed" id="feed"></div>

<script>

/* cursor glow */
document.addEventListener("mousemove", e=>{
    const g=document.getElementById("cursorGlow");
    g.style.left=e.clientX+"px";
    g.style.top=e.clientY+"px";
});

/* counter */
const input=document.getElementById("nicheInput");
input.addEventListener("input",()=>counter.innerText=input.value.length+"/50");

/* button */
const btn=document.getElementById("btn");

btn.onclick=generate;

/* ripple */
btn.addEventListener("click",e=>{
    const circle=document.createElement("span");
    circle.className="ripple";
    circle.style.left=e.offsetX+"px";
    circle.style.top=e.offsetY+"px";
    btn.appendChild(circle);
    setTimeout(()=>circle.remove(),600);
});

/* generate */
async function generate(){
    const niche=input.value.trim();
    if(!niche)return;

    const results=document.getElementById("results");
    const loading=document.getElementById("loading");

    loading.style.display="block";
    results.innerHTML=`<div class="skeleton"></div><div class="skeleton"></div>`;

    setTimeout(()=>{
        loading.style.display="none";
        results.innerHTML="";

        for(let i=0;i<3;i++){
            const text=`This ${niche} strategy will blow your mind...`;

            const div=document.createElement("div");
            div.className="card";
            div.innerHTML=`<div class="copy" onclick="copyText('${text}')">COPY</div><div class="hook-text"></div>`;
            results.appendChild(div);

            typeText(div.querySelector(".hook-text"), text);
        }
    },1500);
}

/* typing */
function typeText(el,text){
    let i=0;
    function t(){
        if(i<text.length){
            el.innerHTML+=text[i];
            i++;
            setTimeout(t,15);
        }
    }
    t();
}

/* copy */
function copyText(t){
    navigator.clipboard.writeText(t);
    const toast=document.getElementById("toast");
    toast.style.display="block";
    setTimeout(()=>toast.style.display="none",1500);
}

/* fake activity */
const names=["James","Sarah","David","Emma","Chris"];
const niches=["Crypto","Fitness","AI","Luxury"];

setInterval(()=>{
    const div=document.createElement("div");
    div.className="activity-item";
    div.innerHTML=`<strong>${names[Math.random()*names.length|0]}</strong> just generated a ${niches[Math.random()*niches.length|0]} hook`;
    feed.prepend(div);
    setTimeout(()=>div.remove(),5000);
},3000);

</script>

</body>
</html>
