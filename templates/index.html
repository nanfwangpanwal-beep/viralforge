<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralForge | Social Architecture OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #35F0BA;
            --cyan: #00E5FF;
            --violet: #A75FFF;
            --bg: #020406;
            --glass: rgba(10, 14, 20, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            --neon-glow: 0 0 25px rgba(53, 240, 186, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; padding-bottom: 50px; }

        .ambient-neural { position: fixed; inset: 0; background: radial-gradient(circle at 20% 30%, #0d121f 0%, #000 100%); z-index: -1; }

        header { 
            position: sticky; top: 0; z-index: 1000; background: rgba(2, 4, 6, 0.9); 
            backdrop-filter: blur(25px); border-bottom: 1px solid var(--border);
            padding: 18px 30px; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: 'Exo', sans-serif; font-size: 1.6rem; font-weight: 800; text-shadow: 0 0 15px rgba(53, 240, 186, 0.4); }
        .logo span { background: linear-gradient(135deg, var(--mint), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .logout-cmd {
            cursor: pointer; font-family: 'JetBrains Mono'; font-size: 10px; color: rgba(255,255,255,0.4); 
            border: 1px solid var(--border); padding: 5px 12px; border-radius: 10px; transition: 0.3s;
        }
        .logout-cmd:hover { color: var(--mint); border-color: var(--mint); box-shadow: 0 0 10px rgba(53, 240, 186, 0.2); }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }

        .card { 
            background: var(--glass); border: 1px solid var(--border); border-radius: 40px; padding: 35px; 
            backdrop-filter: blur(40px); box-shadow: var(--neon-glow); transition: 0.5s; position: relative;
        }

        .span-8 { grid-column: span 8; } .span-4 { grid-column: span 4; } .span-12 { grid-column: span 12; }
        @media (max-width: 900px) { .span-8, .span-4 { grid-column: span 12; } }

        h3 { font-family: 'Exo', sans-serif; font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; color: var(--mint); margin-bottom: 25px; }

        textarea, input, select { 
            width: 100%; background: rgba(255,255,255,0.02); border: 1px solid var(--border); 
            border-radius: 22px; padding: 20px; color: #fff; outline: none; transition: 0.3s;
        }

        .btn-forge { 
            width: 100%; padding: 22px; border-radius: 22px; border: none; 
            background: linear-gradient(135deg, var(--mint), var(--cyan)); 
            color: #000; font-family: 'Exo', sans-serif; font-weight: 800; text-transform: uppercase; cursor: pointer;
        }

        .output-portal { 
            margin-top: 30px; background: rgba(5, 7, 10, 0.85); border: 1px solid var(--border); 
            border-radius: 35px; padding: 35px; border-left: 5px solid var(--mint);
            position: relative; display: none;
        }

        .output-ctrl { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; max-width: 350px; }
        .ctrl-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff;
            padding: 6px 12px; border-radius: 10px; font-family: 'JetBrains Mono'; font-size: 8px; font-weight: 700; cursor: pointer;
        }
        .btn-copy { background: var(--mint); color: #000; border: none; }

        .terminal {
            background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px; margin-top: 20px;
            font-family: 'JetBrains Mono'; font-size: 9px; color: #444; height: 60px; overflow: hidden;
        }
        .term-line { margin-bottom: 4px; display: block; }
        .active-log { color: var(--mint); }

        .glitch-reveal { animation: glitchReveal 0.4s steps(4) forwards; opacity: 0; }
        @keyframes glitchReveal { 0% { opacity: 0; transform: skewX(20deg); } 100% { opacity: 1; transform: skewX(0); } }

        .sync-fill { height: 100%; background: linear-gradient(90deg, var(--mint), var(--cyan)); transition: width 1.2s ease-in-out; }
        
        .history-rail { display: flex; gap: 15px; overflow-x: auto; padding: 15px 0; }
        .history-item { flex: 0 0 180px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 18px; border-radius: 25px; }
        .history-item span { color: var(--mint); font-family: 'JetBrains Mono'; font-size: 10px; display: block; }
        .history-item p { font-size: 10px; opacity: 0.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

<header>
    <div class="logo">Viral<span>Forge.</span></div>
    
    <div style="display: flex; align-items: center; gap: 20px;">
        <div class="logout-cmd" onclick="window.location.href='login.html'">
            [ TERMINATE_SESSION ]
        </div>
        
        <div style="text-align: right; font-family: 'JetBrains Mono'; font-size: 11px;">
            <span id="live-clock">00:00:00</span><br>
            <span style="color: var(--mint); font-size: 8px; letter-spacing: 2px;">APRIL 13, 2026</span>
        </div>
    </div>
</header>

<div class="ambient-neural"></div>

<div class="container">
    <div class="grid">
        <div class="card span-8">
            <h3>Elite Ghostwriter</h3>
            <textarea id="gIn" placeholder="Scan mode: Input history..." rows="4"></textarea>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:15px;">
                <select id="gArc"><option>Archetype: Ego-Centric</option><option>Archetype: Cold Ghoster</option></select>
                <select id="gMove"><option>Strategy: Push-Pull</option><option>Strategy: Scarcity</option></select>
            </div>
            <div class="history-rail" id="gHist"></div>
            <button class="btn-forge" id="gBtn" onclick="initiateForge('ghost')">Forge Stealth Reply</button>
        </div>

        <div class="card span-4">
            <h3>Identity Forge</h3>
            <textarea id="voiceIn" placeholder="Calibrate voice samples..." style="height:160px;"></textarea>
            <div style="margin-top:25px;">
                <div style="display:flex; justify-content:space-between; font-family:'JetBrains Mono'; font-size:9px; margin-bottom:8px;">
                    <span>NEURAL_SYNC</span><span id="syncPerc">0%</span>
                </div>
                <div style="width:100%; height:4px; background:rgba(255,255,255,0.05); border-radius:10px; overflow:hidden;">
                    <div class="sync-fill" id="syncFill" style="width: 0%;"></div>
                </div>
            </div>
            <button class="btn-forge" style="background:transparent; border:1px solid var(--border); color:#fff; font-size:11px; margin-top:20px;" onclick="sync()">Sync Identity</button>
        </div>

        <div class="card span-12">
            <h3>Viral Forge Engine</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap:15px;">
                <input type="text" id="vIn" placeholder="Niche Strategy...">
                <select><option>Hook: Authority Gap</option><option>Hook: Pattern Interrupt</option></select>
                <button class="btn-forge" style="margin:0; padding:0 40px;" id="vBtn" onclick="initiateForge('viral')">Forge Hook</button>
            </div>
            
            <div class="terminal" id="term">
                <span class="term-line">> System Idle. Waiting for neural input...</span>
            </div>

            <div class="output-portal" id="outBox">
                <div class="output-ctrl">
                    <button class="ctrl-btn" onclick="sh('x')">X</button>
                    <button class="ctrl-btn" onclick="sh('wa')">WA</button>
                    <button class="ctrl-btn" onclick="sh('tg')">TG</button>
                    <button class="ctrl-btn" onclick="sh('li')">LI</button>
                    <button class="ctrl-btn" onclick="sh('ig')">IG</button>
                    <button class="ctrl-btn" onclick="sh('rd')">RD</button>
                    <button class="ctrl-btn btn-copy" onclick="cp()">COPY</button>
                </div>
                <div style="font-family:'JetBrains Mono'; font-size:9px; color:#555;">[STATUS: OPTIMIZED]</div>
                <div class="res-text" id="resText" style="font-size: 1.5rem; font-weight: 600; margin: 30px 0;"></div>
                <div id="resStrat" style="font-size:11px; color:#666; border-top:1px solid var(--border); padding-top:20px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateClock() { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-US', {hour12:false}); }
    setInterval(updateClock, 1000); updateClock();

    function sync() {
        const fill = document.getElementById('syncFill');
        fill.style.width = '94.2%';
        setTimeout(() => { document.getElementById('syncPerc').innerText = '94.2%'; }, 1000);
    }

    function log(msg) {
        const term = document.getElementById('term');
        term.innerHTML += `<span class="term-line active-log">> ${msg}</span>`;
        term.scrollTop = term.scrollHeight;
    }

    function initiateForge(type) {
        const btn = type === 'ghost' ? document.getElementById('gBtn') : document.getElementById('vBtn');
        const originalText = btn.innerText;
        btn.innerText = "CALIBRATING...";
        btn.style.opacity = "0.7";

        log("Neural analysis initiated...");
        setTimeout(() => log("Applying pattern interrupt logic..."), 400);
        setTimeout(() => log("Identity voice locked."), 800);

        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.opacity = "1";
            executeForge(type);
        }, 1200);
    }

    function executeForge(type) {
        const box = document.getElementById('outBox');
        const res = document.getElementById('resText');
        box.style.display = 'block';
        res.classList.remove('glitch-reveal');
        void res.offsetWidth;
        res.classList.add('glitch-reveal');

        const content = type === 'ghost' ? "honestly, i was starting to think you were interesting, but now you’re just being predictable." : "Why 99% of founders fail at scale—and the 2-minute fix they ignore.";
        res.innerText = content;
        document.getElementById('resStrat').innerText = "Neural Insight: Protocol optimized for maximum psychological tension.";
        
        const rail = document.getElementById(type === 'ghost' ? 'gHist' : 'vHist');
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `<span>ID_${Math.floor(Math.random()*9999)}</span><p>${content}</p>`;
        rail.prepend(item);
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function cp() { navigator.clipboard.writeText(document.getElementById('resText').innerText); alert("Synced."); }
    function sh(p) { window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(document.getElementById('resText').innerText)}`, '_blank'); }
</script>

</body>
</html>
