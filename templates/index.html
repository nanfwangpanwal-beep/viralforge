<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralForge Elite | The Standard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #35F0BA;
            --accent: #A75FFF;
            --bg: #0C0E14; /* Deepened for luxury contrast */
            --glass: rgba(18, 20, 28, 0.96);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: #E0E0E0; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 10px;
        }

        #neuralCanvas { position: fixed; inset: 0; z-index: 1; opacity: 0.35; pointer-events: none; }

        .app-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 900px;
            margin-top: 3vh;
            padding-bottom: 80px;
        }

        /* --- TRUST & PROGRESS BAR --- */
        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding: 0 10px;
        }

        .step-indicator {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: #484f58;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
        }
        .step-indicator.active { color: var(--primary); }
        .step-indicator.active::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 1px; background: var(--primary); box-shadow: 0 0 8px var(--primary); }

        /* --- HEADER --- */
        h1 { font-size: clamp(3.5rem, 9vw, 5.5rem); font-weight: 800; letter-spacing: -5px; line-height: 0.8; margin-bottom: 1rem; text-align: left; }
        h1 span { background: linear-gradient(90deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .tagline { color: #8b949e; font-size: 1.1rem; margin-bottom: 3.5rem; max-width: 600px; line-height: 1.6; border-left: 2px solid var(--accent); padding-left: 20px; }

        /* --- FORGE CONSOLE --- */
        .console {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 36px;
            padding: clamp(1.5rem, 5vw, 2.5rem);
            backdrop-filter: blur(40px);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        .input-cluster { display: grid; grid-template-columns: 1fr; gap: 18px; margin-bottom: 2rem; }
        @media (min-width: 768px) { .input-cluster { grid-template-columns: 2fr 1fr 1fr; } }

        .input-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 16px 22px;
            transition: 0.3s;
        }
        .input-box:focus-within { border-color: var(--primary); box-shadow: 0 0 30px rgba(53, 240, 186, 0.15); }

        label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #64748b; margin-bottom: 6px; text-transform: uppercase; font-weight: 700; }

        input, select { width: 100%; background: transparent; border: none; color: #fff; font-size: 1.1rem; outline: none; font-weight: 600; }

        /* --- THE BUTTON (From Landing Page logic) --- */
        .forge-btn {
            width: 100%;
            padding: 26px;
            border-radius: 22px;
            border: none;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: #000;
            font-weight: 800;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 10px 40px rgba(167, 95, 255, 0.3);
        }

        .forge-btn:hover { transform: translateY(-5px); box-shadow: 0 20px 50px rgba(53, 240, 186, 0.4); filter: brightness(1.1); }
        .forge-btn:active { transform: scale(0.98); }

        /* --- RESULTS (Expanded Breathing Room) --- */
        #resultsArea { 
            margin-top: 4rem; 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 25px; 
        }

        @media (min-width: 768px) { #resultsArea { grid-template-columns: 1fr 1fr; } }

        .strategy-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 35px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: 0.4s;
            animation: entry 0.7s ease-out forwards;
        }
        .strategy-card:hover { background: rgba(255,255,255,0.04); border-color: var(--primary); }

        @keyframes entry { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .platform-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--primary);
            background: rgba(53, 240, 186, 0.1);
            padding: 6px 16px;
            border-radius: 100px;
            width: fit-content;
        }

        .strategy-hook { font-size: 1.6rem; font-weight: 800; line-height: 1.1; color: #fff; letter-spacing: -1px; }

        .logic-explanation {
            background: rgba(0,0,0,0.3);
            padding: 22px;
            border-radius: 24px;
            font-size: 1rem;
            color: #BBBBBB;
            line-height: 1.7;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .logic-explanation strong { color: var(--accent); }

    </style>
</head>
<body>

<canvas id="neuralCanvas"></canvas>

<div class="app-wrapper">
    <div class="progress-bar">
        <span class="step-indicator active">01. Industry</span>
        <span class="step-indicator">02. Trigger</span>
        <span class="step-indicator">03. Format</span>
        <span class="step-indicator">04. Forge</span>
    </div>

    <h1>Viral<span>Forge.</span></h1>
    <p class="tagline">Convert high-value niches into viral authority with verified AI frameworks. Trusted by creators worldwide.</p>

    <div class="console">
        <div class="input-cluster">
            <div class="input-box">
                <label>Select Industry</label>
                <input type="text" id="industry" placeholder="e.g. Finance, SaaS">
            </div>
            <div class="input-box">
                <label>Choose Trigger</label>
                <select id="trigger">
                    <option>Authority Gap</option>
                    <option>Logic Defiance</option>
                    <option>Pattern Interrupt</option>
                </select>
            </div>
            <div class="input-box">
                <label>Target Channel</label>
                <select id="channel">
                    <option>Omni-Channel</option>
                    <option>LinkedIn Executive</option>
                    <option>X Threads</option>
                    <option>TikTok/Reels</option>
                </select>
            </div>
        </div>

        <button class="forge-btn" onclick="forgeStrategy()">Forge Viral Strategy</button>
    </div>

    <div id="resultsArea"></div>
</div>

<script>
    // --- LIVELY BACKGROUND ---
    const canvas = document.getElementById('neuralCanvas');
    const ctx = canvas.getContext('2d');
    let pts = [];

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        pts = [];
        for(let i=0; i<85; i++) {
            pts.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4
            });
        }
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        pts.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy;
            if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
            if(p.y < 0 || p.y > canvas.height) p.vy *= -1;

            pts.slice(i+1).forEach(p2 => {
                let d = Math.hypot(p.x - p2.x, p.y - p2.y);
                if(d < 170) {
                    ctx.strokeStyle = `rgba(53, 240, 186, ${1 - d/170})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                }
            });
        });
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', init);
    init(); draw();

    // --- FORGE ENGINE ---
    function forgeStrategy() {
        const ind = document.getElementById('industry').value || "Industry";
        const res = document.getElementById('resultsArea');
        res.innerHTML = `<div style="grid-column: 1/-1; text-align:center; font-family:'JetBrains Mono'; color:var(--primary); padding:50px;">ENGAGING FORGE ENGINE...</div>`;

        setTimeout(() => {
            res.innerHTML = "";
            const strategies = [
                { p: "LINKEDIN EXECUTIVE", h: `Why 99% of ${ind} startups fail — and the 3 secrets to avoid it.`, l: "Leverages <strong>Negative Constraint</strong>. High-level readers engage with risk mitigation and proven frameworks." },
                { p: "X VIRAL THREAD", h: `The ${ind} Authority Gap: How to dominate without being loud. 🧵`, l: "Uses <strong>The Curiosity Gap</strong>. Threads that challenge the loud 'status quo' always trigger high bookmark rates." },
                { p: "TIKTOK / REELS", h: `Stop doing this in ${ind} immediately.`, l: "The <strong>Pattern Interrupt</strong>. Commands the user to stop the scroll by highlighting an invisible mistake." },
                { p: "NEWSLETTER (DEEP VALUE)", h: `The raw math behind an elite ${ind} operation.`, l: "Focuses on <strong>Radical Transparency</strong>. Direct value and math always convert better with email subscribers." }
            ];

            strategies.forEach((s, idx) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = "strategy-card";
                    div.innerHTML = `
                        <span class="platform-badge">${s.p}</span>
                        <div class="strategy-hook">${s.h}</div>
                        <div class="logic-explanation"><strong>Forge Logic:</strong> ${s.l}</div>
                    `;
                    res.appendChild(div);
                    if(idx === strategies.length - 1) {
                         window.scrollTo({ top: res.offsetTop - 50, behavior: 'smooth' });
                    }
                }, idx * 150);
            });
        }, 1200);
    }
</script>

</body>
</html>
