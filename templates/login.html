<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralForge | Neural Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #35F0BA;
            --cyan: #00E5FF;
            --bg: #020406;
            --glass: rgba(10, 14, 20, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            --glow: 0 0 20px rgba(53, 240, 186, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Animated Background Layer */
        .ambient-neural { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at 50% 50%, #0d121f 0%, #000 100%); 
            z-index: -1; 
        }

        .auth-card { 
            width: 90%; max-width: 420px; background: var(--glass); border: 1px solid var(--border); 
            border-radius: 40px; padding: 50px; backdrop-filter: blur(40px);
            box-shadow: var(--glow); text-align: center;
            position: relative; animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .logo { font-family: 'Exo', sans-serif; font-size: 2.2rem; font-weight: 800; margin-bottom: 40px; letter-spacing: -1px; }
        .logo span { background: linear-gradient(135deg, var(--mint), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        h2 { font-family: 'Exo', sans-serif; font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--mint); margin-bottom: 30px; opacity: 0.8; }

        input { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
            border-radius: 20px; padding: 18px 25px; color: #fff; outline: none; transition: 0.3s; margin-bottom: 15px;
            font-size: 14px;
        }
        input:focus { border-color: var(--mint); background: rgba(53, 240, 186, 0.03); box-shadow: 0 0 15px rgba(53, 240, 186, 0.1); }

        .btn-access { 
            width: 100%; padding: 20px; border-radius: 20px; border: none; 
            background: linear-gradient(135deg, var(--mint), var(--cyan)); 
            color: #000; font-family: 'Exo', sans-serif; font-weight: 800; text-transform: uppercase; 
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        .btn-access:active { transform: scale(0.98); opacity: 0.9; }

        /* Sync Loader Overlay */
        #sync-overlay {
            position: absolute; inset: 0; background: var(--bg); border-radius: 40px;
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .sync-spinner {
            width: 40px; height: 40px; border: 3px solid rgba(53, 240, 186, 0.1);
            border-top: 3px solid var(--mint); border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .sync-text { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--mint); margin-top: 15px; letter-spacing: 2px; }

        .divider { margin: 30px 0; display: flex; align-items: center; color: #444; font-size: 10px; font-family: 'JetBrains Mono'; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); margin: 0 15px; }

        .social-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .social-btn { 
            background: rgba(255,255,255,0.04); border: 1px solid var(--border); 
            padding: 15px; border-radius: 18px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .social-btn:hover { border-color: var(--mint); background: rgba(255, 255, 255, 0.08); }
        .social-btn img { width: 20px; opacity: 0.7; }

        .toggle-auth { margin-top: 30px; font-size: 11px; color: #666; cursor: pointer; }
        .toggle-auth span { color: var(--mint); font-weight: 600; }
    </style>
</head>
<body>

<div class="ambient-neural"></div>

<div class="auth-card">
    <div id="sync-overlay">
        <div class="sync-spinner"></div>
        <div class="sync-text">ESTABLISHING_LINK...</div>
    </div>

    <div class="logo">Viral<span>Forge.</span></div>
    
    <div id="login-view">
        <h2>Initialize Session</h2>
        <input type="email" id="login-email" placeholder="Neural ID (Email)">
        <input type="password" id="login-pass" placeholder="Access Code">
        <button class="btn-access" onclick="enterTerminal()">Enter Terminal</button>
        
        <div class="divider">OR SECURE CONNECT</div>
        
        <div class="social-grid">
            <div class="social-btn" onclick="enterTerminal()"><img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png"></div>
            <div class="social-btn" onclick="enterTerminal()"><img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" style="filter:invert(1)"></div>
            <div class="social-btn" onclick="enterTerminal()"><img src="https://abs.twimg.com/responsive-web/client-web/icon-ios.b174528a.png"></div>
        </div>
        
        <div class="toggle-auth" onclick="toggle()">New Architect? <span>Forge Identity</span></div>
    </div>

    <div id="signup-view" style="display: none;">
        <h2>Forge Identity</h2>
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Neural ID (Email)">
        <input type="password" placeholder="Create Access Code">
        <button class="btn-access" onclick="enterTerminal()">Initialize Identity</button>
        
        <div class="toggle-auth" onclick="toggle()">Existing Architect? <span>Enter Terminal</span></div>
    </div>
</div>

<script>
    // Toggle between Login and Signup
    function toggle() {
        const login = document.getElementById('login-view');
        const signup = document.getElementById('signup-view');
        const isLogin = login.style.display !== 'none';
        
        login.style.display = isLogin ? 'none' : 'block';
        signup.style.display = isLogin ? 'block' : 'none';
    }

    // THE BRIDGE: Optimized connection logic
    function enterTerminal() {
        const overlay = document.getElementById('sync-overlay');
        const btn = document.querySelector('.btn-access');
        
        // 1. Visual Feedback
        overlay.style.display = 'flex';
        btn.innerText = "Connecting...";
        
        // 2. Short delay to ensure the OS "Syncs" (Better UX)
        setTimeout(() => {
            // Check if we are running locally or on a server
            try {
                // Force redirect to your master file
                window.location.replace('index.html');
            } catch (err) {
                // Fallback if replace fails
                window.location.href = 'index.html';
            }
        }, 1200);
    }

    // Allow "Enter" key to trigger login
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') enterTerminal();
    });
</script>

</body>
</html>
