<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralForge Elite | Actionable Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffa6;
            --accent: #d946ef;
            --bg: #030712;
            --glass: rgba(17, 24, 39, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; cursor: crosshair; }

        body { 
            background-color: var(--bg); 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Animated Neural Plexus Background */
        #plexusCanvas { position: fixed; inset: 0; z-index: 1; opacity: 0.5; pointer-events: none; }

        /* --- THE MASTER SHELL --- */
        .master-shell {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 900px;
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: clamp(1.5rem, 5vw, 3.5rem);
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            animation: appEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes appEntry { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        /* --- HEADER & TRUST signals --- */
        .top-meta {
            display: flex;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--primary);
            letter-spacing: 2.5px;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .signal { display: flex; align-items: center; gap: 8px; }
        .pulse { height: 6px; width: 6px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); animation: blnk 1.5s infinite; }
        @keyframes blnk { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        h1 { font-size: clamp(2.8rem, 7vw, 4.5rem); font-weight: 800; letter-spacing: -3px; line-height: 0.85; margin-bottom: 1rem; }
        h1 span { background: linear-gradient(90deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .promise { color: #94a3b8; font-size: 1.1rem; margin-bottom: 3rem; max-width: 600px; line-height: 1.5; }

        /* --- THE FORGE COMMANDS --- */
        .forge-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        @media (min-width: 768px) { .forge-grid { grid-template-columns: 2fr 1fr 1fr; } }

        .field-group {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 12px 20px;
            transition: 0.3s;
        }

        .field-group:focus-within { border-color: var(--primary); box-shadow: 0 0 25px rgba(0, 255, 166, 0.08); }

        label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: #4b5563; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }

        input, select { width: 100%; background: transparent; border: none; color: #fff; font-size: 1rem; outline: none; font-weight: 600; }

        /* --- THE MAIN ACTION CTA --- */
        .execute-btn {
            width: 100%;
            padding: 24px;
            border-radius: 20px;
            border: none;
            background: #fff;
            color: #000;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .execute-btn:hover {
            background: var(--primary);
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 20px 40px rgba(0, 255, 166, 0.25);
        }

        /* --- RESULTS --- */
        #outputPanel { margin-top: 3.5rem; max-height: 300px; overflow-y: auto; padding-right: 10px; }
        #outputPanel::-webkit-scrollbar { width: 4px; }
        #outputPanel::-webkit-scrollbar-thumb { background: var(--border); }

        .result-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 20px;
            border-left: 3px solid var(--primary);
            margin-bottom: 15px;
            animation: resultReveal 0.6s ease-out forwards;
        }

        @keyframes resultReveal { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }

        .card-meta { font-size: 0.7rem; color: var(--accent); font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px; }

        .typed-hook { font-size: 1.25rem; font-weight: 600; line-height: 1.4; color: #e5e7eb; }
    </style>
</head>
<body>

<div class="master-shell">
    <div class="top-meta">
        <div class="signal"><span class="pulse"></span> System: Online</div>
        <div class="signal">ViralForge ELITE</div>
    </div>

    <h1>Forge <span>Legacy.</span></h1>
    <p class="promise">Convert high-value niches into viral authority with verified psychological frameworks.</p>

    <div class="forge-grid">

            <label>Content Niche</label>
            <input type="text" id="niche" placeholder="e.g. Luxury Real Estate">
        </div>
        <div class="field-group">
            <label>Psychological Tone</label>
            <select id="tone"><option>Authority</option><option>Hype</option><option>Storytelling</option></select>
        </div>
        <div class="field-group">

<script>
    const canvas = document.getElementById('plexusCanvas');
    const ctx = canvas.getContext('2d');
    let points = [];

    // --- PLEXUS ENGINE (Lively background from samples) ---
    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        points = [];
        for(let i=0; i<80; i++) {
            points.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4
            });
        }
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        points.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy;
            if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
            if(p.y < 0 || p.y > canvas.height) p.vy *= -1;

            points.slice(i+1).forEach(p2 => {
                let d = Math.hypot(p.x - p2.x, p.y - p2.y);
                if(d < 160) {
                    ctx.strokeStyle = `rgba(0, 255, 166, ${1 - d/160})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                }
            });
        });
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', init);
    init(); draw();
