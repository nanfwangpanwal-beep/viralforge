<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralForge Pro | Luxury AI</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #00ffa6;
    --secondary: #00d4ff;
    --bg: #030712;
    --card-bg: rgba(17, 24, 39, 0.7);
    --border: rgba(255, 255, 255, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

body {
    height: 100vh;
    background-color: var(--bg);
    background-image: 
        radial-gradient(at 0% 0%, rgba(0, 255, 166, 0.07) 0, transparent 50%), 
        radial-gradient(at 100% 100%, rgba(0, 212, 255, 0.07) 0, transparent 50%);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    overflow: hidden;
}

/* Background Texture */
body::after {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 0;
}

.cursor-glow {
    position: fixed;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(0, 255, 166, 0.1), transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 1;
    transition: width 0.3s, height 0.3s;
}

/* Container */
.container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 720px;
    padding: 3.5rem;
    border-radius: 40px;
    background: var(--card-bg);
    backdrop-filter: blur(40px) saturate(180%);
    border: 1px solid var(--border);
    box-shadow: 0 30px 100px rgba(0, 0, 0, 0.6);
}

.header { text-align: left; margin-bottom: 2rem; }

h1 {
    font-size: 3.5rem;
    font-weight: 800;
    letter-spacing: -2px;
    background: linear-gradient(to right, #fff, #94a3b8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: flex;
    align-items: center;
    gap: 15px;
}

h1 span {
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.tagline { color: #64748b; font-size: 1rem; margin-top: 5px; }

/* Form Elements */
.input-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-bottom: 1.5rem; }

.field-label { display: block; font-size: 0.7rem; color: #4b5563; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }

input, select {
    width: 100%;
    padding: 16px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border);
    border-radius: 16px;
    color: #fff;
    outline: none;
    transition: 0.3s;
    font-size: 0.95rem;
}

input:focus, select:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.4); }

/* Forge Button */
.forge-btn {
    width: 100%;
    padding: 20px;
    border: none;
    border-radius: 20px;
    background: #fff;
    color: #000;
    font-weight: 800;
    font-size: 1.1rem;
    cursor: pointer;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.forge-btn:hover {
    transform: scale(1.02);
    box-shadow: 0 0 30px rgba(0, 255, 166, 0.3);
    background: var(--primary);
}

/* Results */
#results { margin-top: 2.5rem; max-height: 300px; overflow-y: auto; padding-right: 10px; }
#results::-webkit-scrollbar { width: 4px; }
#results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

.card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border);
    padding: 25px;
    border-radius: 24px;
    margin-bottom: 15px;
    transition: 0.3s;
}

.card:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.2); }

.card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

.status-tag {
    background: rgba(0, 255, 166, 0.1);
    color: var(--primary);
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 0.7rem;
    font-weight: 700;
}

.copy-icon { cursor: pointer; opacity: 0.5; transition: 0.3s; }
.copy-icon:hover { opacity: 1; color: var(--primary); }

.hook-text { font-size: 1.1rem; line-height: 1.6; font-weight: 500; color: #e5e7eb; }

/* Activity Feed */
.activity-feed { position: fixed; bottom: 30px; left: 30px; z-index: 100; }
.activity-item {
    background: rgba(17, 24, 39, 0.8);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    padding: 12px 20px;
    border-radius: 100px;
    margin-bottom: 10px;
    font-size: 0.8rem;
    color: #94a3b8;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideIn 0.5s ease-out forwards;
}

@keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

.dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); }

</style>
</head>

<body>

<div class="cursor-glow" id="cursorGlow"></div>

<div class="container">
    <div class="header">
        <h1>Viral<span>Forge</span></h1>
        <p class="tagline">Luxury AI content engine for global creators.</p>
    </div>

    <div class="input-grid">
        <div>
            <label class="field-label">Content Niche</label>
            <input id="nicheInput" maxlength="50" placeholder="e.g. Luxury Watches">
        </div>
        <div>
            <label class="field-label">Tone</label>
            <select id="tone"><option>Authority</option><option>Viral Hype</option><option>Storytelling</option></select>
        </div>
        <div>
            <label class="field-label">Platform</label>
            <select id="platform"><option>TikTok</option><option>Instagram</option><option>YouTube</option></select>
        </div>
    </div>

    <button class="forge-btn" id="btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        FORGE VIRAL CONCEPT
    </button>

    <div id="results"></div>
</div>

<div class="activity-feed" id="feed"></div>

<script>
const input = document.getElementById("nicheInput");
const btn = document.getElementById("btn");
const results = document.getElementById("results");
const feed = document.getElementById("feed");
const cursor = document.getElementById("cursorGlow");

// Cursor Movement
document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});

// Magnetic Button Effect
btn.addEventListener("mousedown", () => {
    cursor.style.width = "200px";
    cursor.style.height = "200px";
});
btn.addEventListener("mouseup", () => {
    cursor.style.width = "400px";
    cursor.style.height = "400px";
});

async function generate() {
    const niche = input.value.trim();
    if (!niche) return;

    btn.innerText = "FORGING MASTERPIECE...";
    btn.style.opacity = "0.7";
    results.innerHTML = "";

    // Simulated Luxury Generation
    setTimeout(() => {
        btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> FORGE VIRAL CONCEPT`;
        btn.style.opacity = "1";

        const ideas = [
            `The $10,000 ${niche} mistake most creators are making right now...`,
            `Why nobody is talking about the "Hidden Truth" of ${niche}...`,
            `3 tools that will make your ${niche} workflow 10x faster.`
        ];

        ideas.forEach((text, i) => {
            setTimeout(() => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <div class="card-top">
                        <span class="status-tag">CONCEPT ${i+1}</span>
                        <span class="copy-icon" onclick="copyText('${text}', this)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        </span>
                    </div>
                    <div class="hook-text">${text}</div>
                `;
                results.prepend(card);
            }, i * 200);
        });
    }, 1200);
}

btn.onclick = generate;

function copyText(text, el) {
    navigator.clipboard.writeText(text);
    el.innerHTML = '<span style="font-size:0.7rem; font-weight:700; color:var(--primary)">COPIED!</span>';
    setTimeout(() => {
        el.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    }, 2000);
}

// Live Social Proof
const users = ["Alex", "Elena", "Marcus", "Sasha", "Julian"];
const niches = ["Luxury", "E-commerce", "SaaS", "Fitness"];

setInterval(() => {
    const item = document.createElement("div");
    item.className = "activity-item";
    item.innerHTML = `<div class="dot"></div> <strong>${users[Math.floor(Math.random()*users.length)]}</strong> generated a ${niches[Math.floor(Math.random()*niches.length)]} idea`;
    feed.prepend(item);
    if(feed.children.length > 3) feed.lastChild.remove();
}, 4000);

</script>

</body>
</html>
