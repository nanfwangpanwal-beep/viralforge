<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralForge | Neural Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #35F0BA;
            --cyan: #00E5FF;
            --bg: #020406;
            --glass: rgba(10, 14, 20, 0.9);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .ambient-neural { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #0d121f 0%, #000 100%); z-index: -1; }

        .auth-card { 
            width: 100%; max-width: 420px; background: var(--glass); border: 1px solid var(--border); 
            border-radius: 40px; padding: 50px; backdrop-filter: blur(40px);
            box-shadow: 0 0 40px rgba(53, 240, 186, 0.1); text-align: center;
        }

        .logo { font-family: 'Exo', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: 40px; }
        .logo span { background: linear-gradient(135deg, var(--mint), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h2 { font-family: 'Exo', sans-serif; font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--mint); margin-bottom: 30px; }

        input { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
            border-radius: 20px; padding: 18px 25px; color: #fff; outline: none; transition: 0.3s; margin-bottom: 15px;
        }
        input:focus { border-color: var(--mint); background: rgba(53, 240, 186, 0.03); }

        .btn-access { 
            width: 100%; padding: 20px; border-radius: 20px; border: none; 
            background: linear-gradient(135deg, var(--mint), var(--cyan)); 
            color: #000; font-family: 'Exo', sans-serif; font-weight: 800; text-transform: uppercase; 
            cursor: pointer; margin-top: 10px;
        }

        .divider { margin: 30px 0; display: flex; align-items: center; color: #444; font-size: 10px; font-family: 'JetBrains Mono'; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); margin: 0 15px; }

        .social-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .social-btn { 
            background: rgba(255,255,255,0.04); border: 1px solid var(--border); 
            padding: 15px; border-radius: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .social-btn:hover { border-color: var(--mint); background: rgba(255, 255, 255, 0.08); }
        .social-btn img { width: 20px; }

        .toggle-auth { margin-top: 30px; font-size: 11px; color: #666; cursor: pointer; }
        .toggle-auth span { color: var(--mint); font-weight: 600; }
    </style>
</head>
<body>
<div class="ambient-neural"></div>
<div class="auth-card">
    <div class="logo">Viral<span>Forge.</span></div>
    
    <div id="login-view">
        <h2>Initialize Session</h2>
        <input type="email" placeholder="Neural ID (Email)">
        <input type="password" placeholder="Access Code">
        <button class="btn-access" onclick="enterTerminal()">Enter Terminal</button>
        <div class="divider">OR SECURE CONNECT</div>
        <div class="social-grid">
            <div class="social-btn" onclick="enterTerminal()"><img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png"></div>
            <div class="social-btn" onclick="enterTerminal()"><img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" style="filter:invert(1)"></div>
            <div class="social-btn" onclick="enterTerminal()"><img src="https://abs.twimg.com/responsive-web/client-web/icon-ios.b174528a.png"></div>
        </div>
        <div class="toggle-auth" onclick="toggle()">New Architect? <span>Forge Identity</span></div>
    </div>

    <div id="signup-view" style="display: none;">
        <h2>Forge Identity</h2>
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Neural ID (Email)">
        <input type="password" placeholder="Create Access Code">
        <button class="btn-access" onclick="enterTerminal()">Initialize Identity</button>
        <div class="toggle-auth" onclick="toggle()">Existing Architect? <span>Enter Terminal</span></div>
    </div>
</div>

<script>
    function toggle() {
        const login = document.getElementById('login-view');
        const signup = document.getElementById('signup-view');
        login.style.display = login.style.display === 'none' ? 'block' : 'none';
        signup.style.display = signup.style.display === 'none' ? 'block' : 'none';
    }

    // THE BRIDGE: This sends the user to your main dashboard file
    function enterTerminal() {
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
