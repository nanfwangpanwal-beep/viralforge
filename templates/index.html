<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralForge Elite | Actionable Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffa6;
            --accent: #d946ef;
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.9);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 15px;
        }

        /* --- THE PROMISE & TRUST SECTION --- */
        .app-shell {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 900px;
            background: var(--glass);
            backdrop-filter: blur(50px);
            border: 1px solid var(--border);
            border-radius: 36px;
            padding: clamp(1.5rem, 5vw, 3.5rem);
            box-shadow: 0 40px 120px rgba(0,0,0,1);
        }

        .trust-signal {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--primary);
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .pulse { height: 6px; width: 6px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        h1 { font-size: clamp(2.2rem, 6vw, 4rem); font-weight: 800; letter-spacing: -3px; line-height: 0.9; margin-bottom: 1rem; }
        h1 span { background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .core-promise { color: #94a3b8; font-size: 1.1rem; margin-bottom: 3rem; max-width: 600px; }

        /* --- REFINED UX INPUTS --- */
        .input-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 1.5rem; }
        @media (min-width: 768px) { .input-grid { grid-template-columns: 2fr 1fr 1fr; } }

        .field-wrap { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 20px; padding: 12px 20px; transition: 0.3s; }
        .field-wrap:focus-within { border-color: var(--primary); background: rgba(0, 255, 166, 0.03); }

        label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; color: #4b5563; margin-bottom: 5px; text-transform: uppercase; }

        input, select { width: 100%; background: transparent; border: none; color: #fff; font-size: 1rem; outline: none; font-weight: 600; appearance: none; }

        /* --- CTA CONVERSION ENGINE --- */
        .execute-btn {
            width: 100%;
            padding: 22px;
            border-radius: 22px;
            border: none;
            background: #fff;
            color: #000;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .execute-btn:hover { background: var(--primary); transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 255, 166, 0.2); }

        /* --- ACTIONABLE RESULTS --- */
        #results { margin-top: 2.5rem; }
        .action-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-label { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--accent); font-weight: 700; }
        .strategy-text { font-size: 1.1rem; font-weight: 600; line-height: 1.4; }
        .logic-hint { font-size: 0.75rem; color: #64748b; font-style: italic; }

    </style>
</head>
<body>

<div class="app-shell">
    <div class="trust-signal">
        <div class="pulse"></div> 2026 Engine Online // Verified Actionable Frameworks
    </div>

    <h1>Viral<span>Forge</span></h1>
    <p class="core-promise">Convert high-value niches into viral authority with AI-driven psychological frameworks.</p>

    <div class="input-grid">
        <div class="field-wrap">
            <label>Niche Industry</label>
            <input type="text" id="niche" placeholder="e.g. Fintech Luxury">
        </div>
        <div class="field-wrap">
            <label>Trigger</label>
            <select id="trigger">
                <option>Authority Gap</option>
                <option>Hype Cycle</option>
                <option>Logic Defiance</option>
            </select>
        </div>
        <div class="field-wrap">
            <label>Format</label>
            <select id="format">
                <option>TikTok (Global)</option>
                <option>Reels (Luxury)</option>
                <option>Shorts (Hard-Cut)</option>
            </select>
        </div>
    </div>

    <button class="execute-btn" onclick="generateActionable()">Activate Forge Engine</button>

    <div id="results"></div>
</div>

<script>
    function generateActionable() {
        const niche = document.getElementById('niche').value;
        const out = document.getElementById('results');
        if(!niche) return;

        out.innerHTML = `<div style="text-align:center; font-family:'JetBrains Mono'; font-size:0.7rem;">CALIBRATING PSYCHOLOGICAL TRIGGERS...</div>`;

        setTimeout(() => {
            out.innerHTML = "";
            const data = [
                { type: "PATTERN INTERRUPT", hook: `The $50k ${niche} mistake that looks like a success.`, logic: "Uses 'Fear of Loss' to stop the scroll immediately." },
                { type: "AUTHORITY FRAME", hook: `Stop using basic tools for ${niche}. Do this instead.`, logic: "Establishes you as an expert by dismissing common methods." }
            ];

            data.forEach(d => {
                const card = document.createElement('div');
                card.className = "action-card";
                card.innerHTML = `
                    <span class="action-label">${d.type}</span>
                    <p class="strategy-text">${d.hook}</p>
                    <p class="logic-hint">Why this works: ${d.logic}</p>
                `;
                out.appendChild(card);
            });
        }, 1000);
    }
</script>

</body>
</html>
