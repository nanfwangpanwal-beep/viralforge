<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralForge Elite | The Standard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffa6;
            --accent: #d946ef;
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.92);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        /* --- INTERACTIVE NEURAL BACKGROUND --- */
        #neuralCanvas { position: fixed; inset: 0; z-index: 1; opacity: 0.4; pointer-events: none; }

        /* --- COMMAND CENTER --- */
        .app-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 850px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: clamp(1.5rem, 5vw, 3rem);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Trust Signals */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .pulse { height: 8px; width: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 12px var(--primary); animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

        h1 { font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 800; letter-spacing: -3px; line-height: 0.85; margin-bottom: 1rem; }
        h1 span { background: linear-gradient(90deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .promise { color: #94a3b8; font-size: 1.1rem; margin-bottom: 3rem; max-width: 550px; line-height: 1.5; }

        /* --- BENTO INPUTS --- */
        .input-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 1.5rem; }
        @media (min-width: 768px) { .input-grid { grid-template-columns: 2fr 1fr 1fr; } }

        .field-group { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 18px; padding: 12px 18px; transition: 0.3s; }
        .field-group:focus-within { border-color: var(--primary); background: rgba(0, 255, 166, 0.03); }

        label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; color: #4b5563; margin-bottom: 4px; text-transform: uppercase; }

        input, select { width: 100%; background: transparent; border: none; color: #fff; font-size: 1rem; outline: none; font-weight: 600; appearance: none; }

        /* --- CTA BUTTON --- */
        .activate-btn {
            width: 100%;
            padding: 24px;
            border-radius: 20px;
            border: none;
            background: #fff;
            color: #000;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
        }

        .activate-btn:hover { background: var(--primary); transform: scale(1.02); box-shadow: 0 20px 40px rgba(0, 255, 166, 0.25); }

        /* --- ACTIONABLE RESULTS --- */
        #output { margin-top: 2.5rem; max-height: 300px; overflow-y: auto; padding-right: 5px; }
        #output::-webkit-scrollbar { width: 4px; }
        #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .result-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 22px;
            margin-bottom: 12px;
            border-left: 4px solid var(--accent);
            animation: slideIn 0.5s ease-out forwards;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }

        .type-tag { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--accent); font-weight: 700; margin-bottom: 8px; display: block; }
        .hook-text { font-size: 1.2rem; font-weight: 600; line-height: 1.4; margin-bottom: 10px; }
        .logic-hint { font-size: 0.8rem; color: #64748b; font-style: italic; display: block; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }

    </style>
</head>
<body>

<canvas id="neuralCanvas"></canvas>

<div class="app-container">
    <div class="status-bar">
        <div class="pulse"></div> 2026 Engine Online // Verified Actionable Frameworks
    </div>

    <h1>Forge <span>Legacy.</span></h1>
    <p class="promise">Convert high-value niches into viral authority with AI-driven psychological frameworks.</p>

    <div class="input-grid">
        <div class="field-group">
            <label>Niche Industry</label>
            <input type="text" id="niche" placeholder="e.g. Luxury Finance">
        </div>
        <div class="field-group">
            <label>Trigger</label>
            <select id="trigger">
                <option>Authority Gap</option>
                <option>Logic Defiance</option>
                <option>Hype Momentum</option>
            </select>
        </div>
        <div class="field-group">
            <label>Format</label>
            <select id="format">
                <option>TikTok (Global)</option>
                <option>Reels (Luxury)</option>
                <option>YT Shorts</option>
            </select>
        </div>
    </div>

    <button class="activate-btn" onclick="engageForge()">Activate Forge Engine</button>

    <div id="output"></div>
</div>

<script>
    // --- NEURAL NETWORK BACKGROUND ---
    const canvas = document.getElementById('neuralCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = [];
        for(let i=0; i<70; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5
            });
        }
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy;
            if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
            if(p.y < 0 || p.y > canvas.height) p.vy *= -1;

            particles.slice(i+1).forEach(p2 => {
                let d = Math.hypot(p.x - p2.x, p.y - p2.y);
                if(d < 150) {
                    ctx.strokeStyle = `rgba(0, 255, 166, ${1 - d/150})`;
                    ctx.lineWidth = 0.6;
                    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                }
            });
        });
        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', init);
    init(); draw();

    // --- STRATEGY ENGINE ---
    function engageForge() {
        const niche = document.getElementById('niche').value || "Luxury Finance";
        const out = document.getElementById('output');
        out.innerHTML = `<div style="text-align:center; font-family:'JetBrains Mono'; color:var(--primary); font-size:0.7rem;">CALIBRATING NEURAL TRIGGERS...</div>`;

        setTimeout(() => {
            out.innerHTML = "";
            const strategies = [
                { type: "PATTERN INTERRUPT", hook: `The $50k ${niche} mistake that looks like a success.`, why: "Uses 'Negative Constraint' to stop the scroll immediately." },
                { type: "LOGIC DEFIANCE", hook: `Why doing the opposite of ${niche} experts is your fastest path to growth.`, why: "Creates a 'Curiosity Gap' by challenging established norms." }
            ];

            strategies.forEach(s => {
                const card = document.createElement('div');
                card.className = "result-card";
                card.innerHTML = `
                    <span class="type-tag">${s.type}</span>
                    <p class="hook-text">${s.hook}</p>
                    <span class="logic-hint">Strategic Logic: ${s.why}</span>
                `;
                out.appendChild(card);
            });
        }, 1200);
    }
</script>

</body>
</html>
