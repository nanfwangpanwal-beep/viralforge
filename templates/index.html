<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralForge AI</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Inter", sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: #fff;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* animated glow bg */
body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,255,166,0.15), transparent);
    filter: blur(120px);
    animation: float 8s infinite ease-in-out;
}
@keyframes float {
    0%,100% { transform: translateY(0);}
    50% { transform: translateY(-40px);}
}

.container {
    width: 95%;
    max-width: 520px;
    padding: 2.5rem;
    border-radius: 24px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

h1 {
    font-size: 2.3rem;
    background: linear-gradient(90deg, #00ffa6, #00c3ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

p {
    color: #94a3b8;
    margin: 10px 0 2rem;
}

/* input */
.input-group {
    position: relative;
}

input {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: white;
    outline: none;
}

.counter {
    position: absolute;
    right: 10px;
    top: 12px;
    font-size: 0.75rem;
    color: #64748b;
}

/* button */
button {
    width: 100%;
    padding: 16px;
    margin-top: 1rem;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #00ffa6, #00c3ff);
    color: #021617;
    font-weight: 600;
    cursor: pointer;
    transition: 0.25s;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

button:hover:not(:disabled) {
    transform: translateY(-2px);
}

/* hooks list */
#results {
    margin-top: 2rem;
    display: none;
}

.hook {
    background: rgba(255,255,255,0.03);
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    animation: fadeIn 0.4s ease;
}

.hook-text {
    font-size: 0.95rem;
    color: #00ffa6;
    flex: 1;
}

/* copy btn */
.copy {
    background: rgba(255,255,255,0.05);
    border: none;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
    color: #94a3b8;
}

.copy:hover {
    background: rgba(0,255,166,0.2);
    color: #00ffa6;
}

/* loading */
.loading {
    margin-top: 1rem;
    display: none;
    font-size: 0.9rem;
    color: #64748b;
}

/* toast */
.toast {
    position: fixed;
    bottom: 20px;
    background: #00ffa6;
    color: #021617;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 0.9rem;
    display: none;
}

/* animation */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h1>ViralForge AI</h1>
    <p>Generate scroll-stopping viral hooks instantly.</p>

    <div class="input-group">
        <input id="nicheInput" maxlength="50" placeholder="Enter niche (e.g. Real Estate)">
        <div class="counter" id="counter">0/50</div>
    </div>

    <button id="generateBtn">Generate Hooks</button>

    <div class="loading" id="loading">⚡ Generating viral hooks...</div>

    <div id="results"></div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
const input = document.getElementById("nicheInput");
const counter = document.getElementById("counter");
const btn = document.getElementById("generateBtn");
const results = document.getElementById("results");
const loading = document.getElementById("loading");
const toast = document.getElementById("toast");

/* character counter */
input.addEventListener("input", () => {
    counter.innerText = input.value.length + "/50";
});

/* enter key */
input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") generateHooks();
});

btn.onclick = generateHooks;

async function generateHooks() {
    const niche = input.value.trim();
    if (!niche) return alert("Enter a niche");

    btn.disabled = true;
    loading.style.display = "block";
    results.style.display = "none";

    try {
        const res = await fetch(`/generate?niche=${encodeURIComponent(niche)}`);
        const data = await res.json();

        loading.style.display = "none";
        btn.disabled = false;
        results.innerHTML = "";
        results.style.display = "block";

        if (data.status === "success") {
            const hooks = Array.isArray(data.hooks) ? data.hooks : [data.hook];

            hooks.forEach(h => {
                const div = document.createElement("div");
                div.className = "hook";

                div.innerHTML = `
                    <div class="hook-text">${h}</div>
                    <button class="copy">Copy</button>
                `;

                div.querySelector(".copy").onclick = () => {
                    navigator.clipboard.writeText(h);
                    showToast();
                };

                results.appendChild(div);
            });

        } else {
            results.innerHTML = `<div class="hook-text">Error: ${data.message}</div>`;
        }

    } catch {
        loading.style.display = "none";
        btn.disabled = false;
        results.style.display = "block";
        results.innerHTML = `<div class="hook-text">Server error</div>`;
    }
}

/* toast */
function showToast() {
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 1500);
}
</script>

</body>
</html>
