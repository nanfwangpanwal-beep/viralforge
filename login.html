<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralForge | Neural Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #35F0BA;
            --violet: #A75FFF;
            --bg: #030508;
            --glass: rgba(10, 14, 20, 0.85);
            --border: rgba(53, 240, 186, 0.2);
        }

        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(53, 240, 186, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(53, 240, 186, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        /* Ambient Glow Effect */
        body::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(167, 95, 255, 0.15) 0%, transparent 70%);
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        .auth-card {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 40px;
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.5), 0 0 20px rgba(53, 240, 186, 0.1);
            position: relative;
        }

        .logo {
            font-family: 'Exo', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1.5px;
            text-shadow: 0 0 15px rgba(53, 240, 186, 0.4);
        }

        .logo span {
            background: linear-gradient(135deg, var(--mint), var(--violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-family: 'JetBrains Mono';
            font-size: 10px;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            color: #fff;
            margin-bottom: 12px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--mint);
            background: rgba(53, 240, 186, 0.05);
        }

        .btn-access {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(135deg, var(--mint), var(--violet));
            color: #000;
            font-family: 'Exo', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(53, 240, 186, 0.3);
            transition: 0.3s;
        }

        .btn-access:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(53, 240, 186, 0.5);
        }

        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            font-size: 10px;
            color: #444;
            text-transform: uppercase;
            font-family: 'JetBrains Mono';
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
            margin: 0 10px;
        }

        /* 3rd Party Sign-in List */
        .social-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .social-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
            color: #bbb;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .social-btn:hover {
            background: rgba(255,255,255,0.07);
            color: #fff;
            border-color: rgba(255,255,255,0.2);
        }

        #sync-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg);
            border-radius: 40px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .sync-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(53, 240, 186, 0.1);
            border-top: 3px solid var(--mint);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="auth-card">
    <div id="sync-overlay">
        <div class="sync-spinner"></div>
        <div style="font-family:'JetBrains Mono'; font-size:10px; color:var(--mint); margin-top:15px; letter-spacing: 2px;">ESTABLISHING_NEURAL_LINK</div>
    </div>

    <div class="logo">Viral<span>Forge.</span></div>
    <div class="subtitle">Social Architecture OS v3.0</div>

    <input type="email" placeholder="Neural Identity">
    <input type="password" placeholder="Access Code">
    <button class="btn-access" onclick="enter()">Initialize Link</button>

    <div class="divider">External Auth Gate</div>

    <div class="social-list">
        <div class="social-btn" onclick="enter()">
            <img src="https://www.google.com/favicon.ico" width="16" alt=""> Continue with Google
        </div>
        <div class="social-btn" onclick="enter()">
            <span style="font-size: 16px; font-family: 'Exo'; color:#fff">𝕏</span> Continue with X
        </div>
        <div class="social-btn" onclick="enter()">
            <img src="https://www.apple.com/favicon.ico" width="16" alt=""> Continue with Apple
        </div>
    </div>
</div>

<script>
    function enter() {
        document.getElementById('sync-overlay').style.display = 'flex';
        // Secure redirect to index page
        setTimeout(() => { 
            window.location.href = 'index.html'; 
        }, 1500);
    }
</script>

</body>
</html>
