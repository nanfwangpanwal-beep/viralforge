<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralForge Elite | Omni-Engine & Ghostwriter</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@700;800&family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #35F0BA;
            --violet: #A75FFF;
            --cyan: #00E5FF;
            --bg: #080A10;
            --glass: rgba(13, 17, 23, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --gradient: linear-gradient(90deg, var(--mint), var(--violet));
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: #E0E0E0; font-family: 'Inter', sans-serif; overflow-x: hidden; line-height: 1.6; }
        #neuralCanvas { position: fixed; inset: 0; z-index: 1; opacity: 0.3; pointer-events: none; }

        .container { position: relative; z-index: 10; width: 100%; max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        /* --- TABS --- */
        .mode-switcher {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 3rem;
        }
        .mode-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 100px;
            color: #8b949e;
            cursor: pointer;
            font-family: 'Exo', sans-serif;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .mode-btn.active {
            background: var(--gradient);
            color: #000;
            border-color: transparent;
            box-shadow: 0 0 20px rgba(53, 240, 186, 0.3);
        }

        /* --- HERO --- */
        .hero { text-align: center; padding: 40px 0; }
        h1 { font-family: 'Exo', sans-serif; font-size: clamp(3rem, 8vw, 5rem); font-weight: 800; letter-spacing: -3px; line-height: 0.9; margin-bottom: 1rem; }
        h1 span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-sub { color: #8b949e; font-size: 1.1rem; margin-bottom: 2rem; max-width: 600px; margin-inline: auto; }

        /* --- GHOSTWRITER UI --- */
        .panel {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 30px;
            backdrop-filter: blur(20px);
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .panel.active { display: block; }

        .chat-input-area {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            resize: none;
            outline: none;
            min-height: 120px;
        }
        
        .option-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-wrap {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 12px 18px;
        }
        label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        select, input { width: 100%; background: transparent; border: none; color: #fff; font-weight: 600; outline: none; }

        .execute-btn {
            width: 100%;
            padding: 22px;
            border-radius: 18px;
            border: none;
            background: var(--gradient);
            color: #000;
            font-weight: 800;
            font-family: 'Exo', sans-serif;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }
        .execute-btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 10px 30px rgba(53, 240, 186, 0.3); }

        #outputBox {
            margin-top: 2rem;
            padding: 25px;
            border-radius: 24px;
            background: rgba(255,255,255,0.02);
            border-left: 4px solid var(--mint);
            display: none;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

<canvas id="neuralCanvas"></canvas>

<div class="container">
    <section class="hero">
        <h1>Viral<span>Forge.</span></h1>
        <p class="hero-sub">The elite engine for content dominance and invisible social engineering.</p>
    </section>

    <div class="mode-switcher">
        <button class="mode-btn active" onclick="switchMode('forge')">Content Forge</button>
        <button class="mode-btn" onclick="switchMode('ghost')">Ghostwriter AI</button>
    </div>

    <div id="forgePanel" class="panel active">
        <div class="option-grid">
            <div class="input-wrap">
                <label>Niche</label>
                <input type="text" id="niche" placeholder="SaaS, Luxury...">
            </div>
            <div class="input-wrap">
                <label>Target</label>
                <select id="platform">
                    <option>Omni-Channel</option>
                    <option>X / Twitter</option>
                    <option>LinkedIn</option>
                </select>
            </div>
        </div>
        <button class="execute-btn" onclick="runForge()">🚀 Generate Strategies</button>
    </div>

    <div id="ghostPanel" class="panel">
        <div class="chat-input-area">
            <label>Paste Previous Chat History</label>
            <textarea id="chatHistory" placeholder="Them: Hey, I saw your post.
You: Thanks! Just something I've been working on..."></textarea>
        </div>
        
        <div class="option-grid">
            <div class="input-wrap">
                <label>Desired Mood</label>
                <select id="mood">
                    <option>Witty & Playful</option>
                    <option>Flirty (Unfiltered)</option>
                    <option>Stoic / Mysterious</option>
                    <option>Executive / Sharp</option>
                </select>
            </div>
            <div class="input-wrap">
                <label>User Personality</label>
                <input type="text" id="userBio" placeholder="Casual, blunt, intelligent...">
            </div>
        </div>
        <button class="execute-btn" onclick="runGhostwriter()">💎 Generate Perfect Reply</button>
    </div>

    <div id="outputBox">
        <label id="outLabel">Result</label>
        <div id="outText" style="font-size: 1.2rem; color: #fff; font-weight: 500; margin-top: 10px;"></div>
        <div style="margin-top: 15px; font-size: 0.8rem; color: var(--mint); font-family: 'JetBrains Mono';">SCANNED FOR 1% HUMAN CALIBRATION ✓</div>
    </div>
</div>

<script>
    function switchMode(mode) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(mode + 'Panel').classList.add('active');
        event.target.classList.add('active');
        document.getElementById('outputBox').style.display = 'none';
    }

    function runGhostwriter() {
        const history = document.getElementById('chatHistory').value;
        const mood = document.getElementById('mood').value;
        const output = document.getElementById('outputBox');
        const text = document.getElementById('outText');

        if(!history) return alert("Paste some context first!");

        output.style.display = 'block';
        text.innerText = "Analyzing social subtext...";

        setTimeout(() => {
            // Strategic Logic: High-level calibrated responses
            const responses = {
                "Witty & Playful": "honestly, i’m just surprised you didn’t lead with a better opening line than that. but i'll give you a pass for now.",
                "Flirty (Unfiltered)": "you’re dangerous. i was supposed to be productive tonight, but now i’m just wondering what else you’re good at besides being a distraction.",
                "Stoic / Mysterious": "most people would say a lot right now. i’m more interested in what you’re not saying.",
                "Executive / Sharp": "i appreciate the directness. let’s skip the small talk—are we making this happen or just theorizing?"
            };
            text.innerText = responses[mood] || "noted. let's try a different angle.";
            document.getElementById('outLabel').innerText = "GHOSTWRITER SUGGESTION (" + mood.toUpperCase() + ")";
        }, 1500);
    }

    function runForge() {
        // ... (Original forge logic) ...
        document.getElementById('outputBox').style.display = 'block';
        document.getElementById('outText').innerText = "Strategic frameworks generated. Check your omni-results below.";
    }

    // (Background neural canvas code remains same)
    const canvas = document.getElementById('neuralCanvas');
    const ctx = canvas.getContext('2d');
    let nodes = [];
    function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; nodes = []; for(let i=0; i<60; i++) nodes.push({x: Math.random()*canvas.width, y:Math.random()*canvas.height, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5}); }
    function draw() { ctx.clearRect(0,0,canvas.width, canvas.height); nodes.forEach((n,i) => { n.x += n.vx; n.y += n.vy; if(n.x<0||n.x>canvas.width) n.vx*=-1; if(n.y<0||n.y>canvas.height) n.vy*=-1; nodes.slice(i+1).forEach(n2 => { let d = Math.hypot(n.x-n2.x, n.y-n2.y); if(d<150){ctx.strokeStyle=`rgba(53, 240, 186, ${0.3-d/500})`; ctx.beginPath(); ctx.moveTo(n.x,n.y); ctx.lineTo(n2.x,n2.y); ctx.stroke();}});}); requestAnimationFrame(draw);}
    window.addEventListener('resize', init); init(); draw();
</script>

</body>
</html>
