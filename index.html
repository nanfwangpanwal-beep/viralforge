<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViralForge</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0A0A0A;
      color: #fff;
      text-align: center;
      padding: 30px;
    }
    h1 {
      font-size: 3em;
      font-weight: 700;
      background: linear-gradient(90deg, #FFD700, #FF4B5C);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    p {
      color: #aaa;
      margin-bottom: 30px;
    }
    input {
      width: 70%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      background: #1a1a1a;
      color: #fff;
      font-size: 16px;
      margin-bottom: 20px;
    }
    button {
      padding: 15px 25px;
      border-radius: 10px;
      border: none;
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(90deg, #ff4757, #ff6b81);
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(255, 71, 87, 0.6);
    }
    button:hover {
      background: linear-gradient(90deg, #FFD700, #FF4B5C);
      color: #111;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
    }
    .bento {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 40px;
    }
    .box {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      text-align: left;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.15);
      transition: all 0.5s ease;
    }
    .box h2 {
      color: #FFD700;
      margin-bottom: 10px;
    }
    #progress {
      margin-top: 20px;
      font-size: 14px;
      color: #FF4B5C;
    }
    #export {
      margin-top: 30px;
      padding: 12px 20px;
      border-radius: 8px;
      background: #FFD700;
      color: #111;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🔥 ViralForge</h1>
  <p>Luxury AI for Viral Creators</p>
  
  <input type="text" id="niche" placeholder="Enter your niche (e.g. fitness)">
  <br>
  <button onclick="generate()">✨ Forge Viral Idea</button>
  
  <div id="progress"></div>
  
  <div class="bento">
    <div class="box" id="angle"><h2>Psychological Angle</h2><p>...</p></div>
    <div class="box" id="hook"><h2>Hook Trinity</h2><p>...</p></div>
    <div class="box" id="script"><h2>Retainer Script</h2><p>...</p></div>
    <div class="box" id="metadata"><h2>Viral Metadata</h2><p>...</p></div>
  </div>
  
  <button id="export">📂 Export Content Brief to PDF</button>
  
  <script>
    async function generate() {
      const niche = document.getElementById('niche').value;
      const progress = document.getElementById('progress');
      const messages = [
        "Scanned 5,000+ trending hooks...",
        "Analyzing audience retention patterns...",
        "Forging your viral masterpiece..."
      ];
      let i = 0;
      const interval = setInterval(() => {
        progress.innerText = messages[i];
        i++;
        if (i === messages.length) clearInterval(interval);
      }, 1500);

      try {
        const res = await fetch(`http://localhost:5000/generate?niche=${niche}`);
        const data = await res.json();
        // For now, just put the raw result into one box
        document.getElementById('angle').innerHTML = "<h2>Psychological Angle</h2><p>" + (data.result || "Error") + "</p>";
        document.getElementById('hook').innerHTML = "<h2>Hook Trinity</h2><p>" + (data.result || "Error") + "</p>";
        document.getElementById('script').innerHTML = "<h2>Retainer Script</h2><p>" + (data.result || "Error") + "</p>";
        document.getElementById('metadata').innerHTML = "<h2>Viral Metadata</h2><p>" + (data.result || "Error") + "</p>";
      } catch (err) {
        progress.innerText = "Error generating content.";
      }
    }
  </script>
</body>
</html>
