<style>
    /* Glow-Visibility for Section Names */
    h3 {
        color: #fff !important; /* Making titles pure white for visibility */
        text-shadow: 0 0 10px rgba(53, 240, 186, 0.4); /* Adding the brand glow */
        letter-spacing: 3px;
    }

    /* Mobile-Perfect Copy Positioning */
    .copy-pill {
        top: 12px !important;
        right: 12px !important;
        background: rgba(53, 240, 186, 0.15) !important;
        backdrop-filter: blur(5px);
        font-weight: 700;
        border: 1px solid var(--mint) !important;
    }

    /* Neural Pulse Animation for Output Boxes */
    .output-area {
        position: relative;
    }
    .output-area::after {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 20px;
        padding: 1px;
        background: linear-gradient(90deg, transparent, var(--mint), transparent);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        background-size: 200% auto;
        animation: pulseGradient 4s linear infinite;
    }

    @keyframes pulseGradient {
        0% { background-position: 0% center; }
        100% { background-position: 200% center; }
    }
</style>

<script>
    function addHist(id, txt) {
        const rail = document.getElementById(id);
        const div = document.createElement('div');
        div.className = 'history-item';
        
        // REPLACING ARC_ WITH PROFESSIONAL LOGIC
        const prefix = id === 'gHist' ? 'NEURAL_LOG' : 'SYNC_ID';
        const hex = Math.floor(Math.random()*16777215).toString(16).toUpperCase().substring(0,4);
        
        div.innerHTML = `<span>${prefix}_${hex}</span><p>${txt}</p>`;
        rail.prepend(div);
        if(rail.children.length > 4) rail.lastChild.remove();
    }
</script>
