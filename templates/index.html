<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralForge | Elite Social Engineering</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@700;800&family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #35F0BA;
            --violet: #A75FFF;
            --bg: #05070A;
            --glass: rgba(13, 17, 23, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --gradient: linear-gradient(135deg, var(--mint) 0%, var(--violet) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: #E0E0E0; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #151b2d 0%, #05070a 100%);
            min-height: 100vh;
        }

        .container { position: relative; z-index: 10; width: 100%; max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

        /* --- BRANDING --- */
        .brand-header { text-align: center; margin-bottom: 40px; }
        .brand-logo { font-family: 'Exo', sans-serif; font-size: 2.5rem; font-weight: 800; letter-spacing: -2px; }
        .brand-logo span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- NAVIGATION --- */
        .nav-pills {
            display: flex;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 6px;
            border-radius: 20px;
            width: fit-content;
            margin: 0 auto 50px;
        }
        .pill {
            padding: 10px 25px;
            border-radius: 15px;
            cursor: pointer;
            font-family: 'Exo', sans-serif;
            font-size: 0.85rem;
            color: #8b949e;
            transition: 0.3s;
        }
        .pill.active { background: var(--gradient); color: #000; font-weight: 800; box-shadow: 0 5px 15px rgba(53, 240, 186, 0.2); }

        /* --- BENTO PANELS --- */
        .bento-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: clamp(1.5rem, 5vw, 2.5rem);
            backdrop-filter: blur(30px);
            display: none;
            animation: appEntry 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .bento-card.active { display: block; }

        @keyframes appEntry { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-family: 'Exo', sans-serif; font-size: 2rem; margin-bottom: 1.5rem; letter-spacing: -1px; }
        h2 span { color: var(--mint); }

        /* --- INPUTS --- */
        .input-stack { display: flex; flex-direction: column; gap: 20px; margin-bottom: 2rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .grid-2 { grid-template-columns: 1fr 1fr; } }

        .field {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 15px 20px;
            transition: 0.3s;
        }
        .field:focus-within { border-color: var(--mint); background: rgba(255,255,255,0.05); }

        label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--mint); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px; }

        input, select, textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 1rem; outline: none; font-weight: 500; }
        textarea { min-height: 120px; line-height: 1.6; resize: none; font-family: 'Inter', sans-serif; }

        /* --- BUTTONS --- */
        .action-btn {
            width: 100%;
            padding: 22px;
            border-radius: 20px;
            border: none;
            background: var(--gradient);
            color: #000;
            font-weight: 800;
            font-family: 'Exo', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
        }
        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(53, 240, 186, 0.3); }

        /* --- OUTPUT --- */
        #outputWrapper {
            margin-top: 2.5rem;
            padding: 25px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 25px;
            border-left: 4px solid var(--mint);
            display: none;
        }
        .out-meta { font-family: 'JetBrains Mono'; font-size: 10px; color: #64748b; margin-bottom: 12px; }
        .out-data { font-size: 1.25rem; font-weight: 600; line-height: 1.4; color: #fff; }

    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <div class="brand-logo">Viral<span>Forge.</span></div>
    </div>

    <div class="nav-pills">
        <div class="pill active" onclick="setTab('writer', this)">Ghostwriter</div>
        <div class="pill" onclick="setTab('forge', this)">Viral Engine</div>
        <div class="pill" onclick="setTab('identity', this)">Identity Forge</div>
    </div>

    <div id="writer" class="bento-card active">
        <h2>Elite <span>Ghost-Reply.</span></h2>
        <div class="input-stack">
            <div class="field">
                <label>Chat Context (Paste History)</label>
                <textarea id="chatInput" placeholder="Them: That was an interesting take.
You: I try my best..."></textarea>
            </div>
            <div class="grid-2">
                <div class="field">
                    <label>Mood Calibration</label>
                    <select id="mood">
                        <option value="witty">Witty & Playful</option>
                        <option value="flirty">Flirty (Unfiltered)</option>
                        <option value="stoic">Stoic / Mysterious</option>
                        <option value="sharp">Executive / Sharp</option>
                    </select>
                </div>
                <div class="field">
                    <label>Objective</label>
                    <input type="text" placeholder="e.g. Tension, Meeting, Closure">
                </div>
            </div>
        </div>
        <button class="action-btn" onclick="executeGhost()">Generate Calibrated Reply</button>
    </div>

    <div id="forge" class="bento-card">
        <h2>Viral <span>Strategy.</span></h2>
        <div class="input-stack">
            <div class="field">
                <label>Core Niche</label>
                <input type="text" id="niche" placeholder="Real Estate, SaaS, Lifestyle...">
            </div>
            <div class="field">
                <label>Psychological Hook</label>
                <select id="hook">
                    <option>Authority Gap</option>
                    <option>The Negative Constraint</option>
                    <option>Logic Defiance</option>
                </select>
            </div>
        </div>
        <button class="action-btn" onclick="executeForge()">Forge Viral Blueprint</button>
    </div>

    <div id="identity" class="bento-card">
        <h2>Identity <span>Forge.</span></h2>
        <div class="input-stack">
            <div class="field">
                <label>Your Tone / Personality</label>
                <textarea placeholder="e.g. I use lowercase, I am blunt but respectful, I value dry humor..."></textarea>
            </div>
            <div class="field">
                <label>Vocabulary Preferences</label>
                <input type="text" placeholder="Keywords or slang you use often">
            </div>
        </div>
        <button class="action-btn" onclick="alert('Voice Identity Captured.')">Save Voice Profile</button>
    </div>

    <div id="outputWrapper">
        <div class="out-meta" id="outLabel">SYSTEM_READY</div>
        <div class="out-data" id="outText"></div>
        <div style="margin-top: 15px; font-size: 0.7rem; color: var(--mint); font-family: 'JetBrains Mono';">VIRALFORGE 1% HUMAN SOCIAL CALIBRATION ACTIVE</div>
    </div>
</div>

<script>
    function setTab(id, el) {
        document.querySelectorAll('.bento-card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        document.getElementById('outputWrapper').style.display = 'none';
    }

    function executeGhost() {
        const out = document.getElementById('outputWrapper');
        const text = document.getElementById('outText');
        const mood = document.getElementById('mood').value;
        
        out.style.display = 'block';
        text.innerText = "Analyzing social subtext...";
        
        const database = {
            witty: "honestly, i’m just surprised you didn’t lead with a better opening line than that. but i'll give you a pass for now.",
            flirty: "you’re dangerous. i was supposed to be productive tonight, but now i’m just wondering what else you’re good at besides being a distraction.",
            stoic: "most people would say a lot right now. i’m more interested in what you’re not saying.",
            sharp: "directness is rare. let's skip the small talk—are we making this happen or just theorizing?"
        };

        setTimeout(() => {
            text.innerText = database[mood];
            document.getElementById('outLabel').innerText = "VIRALFORGE // GHOSTWRITER_OUTPUT";
        }, 1200);
    }

    function executeForge() {
        const out = document.getElementById('outputWrapper');
        const text = document.getElementById('outText');
        out.style.display = 'block';
        text.innerText = "Scanning high-value patterns...";
        setTimeout(() => {
            text.innerText = "Why 99% of " + (document.getElementById('niche').value || "Industry") + " creators fail—and the 3 invisible shifts that change everything.";
            document.getElementById('outLabel').innerText = "VIRALFORGE // STRATEGY_BLUEPRINT";
        }, 1200);
    }
</script>

</body>
</html>
